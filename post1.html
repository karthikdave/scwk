<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Shot #1</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white text-gray-800 px-6 py-3 flex justify-between items-center">
  <img src="logo.png" class="h-10">

  <div class="space-x-6 font-medium">
    <a href="index.html">Home</a>
    <a href="post1.html" class="text-blue-600">AI Shots</a>
    <a href="scwk-dose.html">SCWK Dose</a>
    <a href="about.html">About</a>
  </div>
</nav>

<!-- BACK -->
<div class="max-w-5xl mx-auto px-4 mt-4">
  <a href="index.html" class="text-sm text-blue-400">← Back</a>
</div>

<!-- SLIDE -->
<section class="flex-grow flex items-center justify-center px-4">

  <div class="w-full max-w-3xl text-center">

    <p class="text-sm text-blue-400 mb-6">AI Shot #1</p>

    <h1 id="title" class="text-4xl md:text-5xl font-bold leading-tight mb-6">
      AI Won’t Replace You
    </h1>

    <p id="content" class="text-xl text-gray-300">
      But something else will...
    </p>

  </div>

</section>

<!-- CONTROLS -->
<div class="flex justify-center items-center gap-6 mb-10">

  <button onclick="prevSlide()" class="px-4 py-2 bg-gray-700 rounded hover:bg-gray-600">
    ←
  </button>

  <span id="indicator" class="text-gray-400">1 / 4</span>

  <button onclick="nextSlide()" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700">
    →
  </button>

</div>

<!-- FOOTER -->
<footer class="text-center text-gray-500 text-sm mb-4">
  © 2026 SCWK
</footer>

<script>
const slides = [
  { title: "AI Won’t Replace You", content: "But something else will..." },
  { title: "The Real Threat", content: "People who know how to use AI effectively." },
  { title: "The Shift", content: "It’s no longer skill vs no skill." },
  { title: "The Reality", content: "It’s adaptability vs stagnation." }
];

let current = 0;

function updateSlide() {
  document.getElementById("title").innerText = slides[current].title;
  document.getElementById("content").innerText = slides[current].content;
  document.getElementById("indicator").innerText = (current + 1) + " / " + slides.length;
}

function nextSlide() {
  if (current < slides.length - 1) {
    current++;
    updateSlide();
  }
}

function prevSlide() {
  if (current > 0) {
    current--;
    updateSlide();
  }
}
</script>

</body>
</html>
