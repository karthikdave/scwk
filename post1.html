</head>

<body class="bg-gray-100 text-gray-800 font-sans flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center">
  <img src="logo.png" class="h-10">
  <div class="space-x-6 text-gray-700 font-medium">

<!-- BACK -->

  <a href="index.html" class="text-sm text-blue-600 hover:underline">← Back to Home</a>
</div>

<!-- TITLE -->
<div class="max-w-6xl mx-auto px-4 mt-2">
  <h1 class="text-2xl font-bold">AI Shot #1</h1>
  <p class="text-gray-600">AI Won’t Replace You — But This Will</p>
</div>

<!-- PDF CAROUSEL -->
<section class="flex-grow flex justify-center items-center px-4 mt-6">

  <div class="bg-white rounded-2xl shadow-lg p-4">

    <canvas id="pdf-canvas" class="rounded-lg"></canvas>

    <!-- CONTROLS -->
    <div class="flex justify-between items-center mt-4">

      <button onclick="prevPage()" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">
        ← Prev
      </button>

      <span id="page-info" class="text-sm text-gray-600"></span>

      <button onclick="nextPage()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Next →
      </button>

    </div>

  </div>

</section>

<!-- FOOTER -->
<footer class="bg-white border-t mt-auto text-center text-gray-500 py-4">
  © 2026 SCWK
</footer>

<script>
const url = "ai-shot-1.pdf"; // 🔥 upload your PDF in repo

let pdfDoc = null,
    pageNum = 1,
    canvas = document.getElementById("pdf-canvas"),
    ctx = canvas.getContext("2d");

pdfjsLib.getDocument(url).promise.then(function(pdf) {
  pdfDoc = pdf;
  renderPage(pageNum);
});

function renderPage(num) {
  pdfDoc.getPage(num).then(function(page) {

    const viewport = page.getViewport({ scale: 1.5 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };

    page.render(renderContext);

    document.getElementById("page-info").innerText =
      num + " / " + pdfDoc.numPages;
  });
}

function nextPage() {
  if (pageNum < pdfDoc.numPages) {
    pageNum++;
    renderPage(pageNum);
  }
}

function prevPage() {
  if (pageNum > 1) {
    pageNum--;
    renderPage(pageNum);
  }
}
</script>

</body>
</html>
