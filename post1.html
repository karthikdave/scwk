<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Shot #1</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans flex flex-col min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <img src="logo.png" class="h-10">
  </div>

  <div class="space-x-6 text-gray-700 font-medium">
    <a href="index.html" class="hover:text-blue-600">Home</a>
    <a href="post1.html" class="text-blue-600 font-semibold">AI Shots</a>
    <a href="scwk-dose.html" class="hover:text-blue-600">SCWK Dose</a>
    <a href="about.html" class="hover:text-blue-600">About</a>
  </div>
</nav>

<!-- BACK -->
<div class="max-w-5xl mx-auto px-4 mt-6">
  <a href="index.html" class="text-sm text-blue-600 hover:underline">← Back to Home</a>
</div>

<!-- CAROUSEL -->
<section class="flex-grow flex items-center justify-center px-4 mt-6">

  <div class="bg-white rounded-2xl shadow-lg w-full max-w-3xl p-10 text-center">

    <div id="slide" class="transition-all duration-300">

      <h2 class="text-sm text-blue-600 font-semibold mb-3">AI Shot #1</h2>

      <h1 id="title" class="text-2xl md:text-3xl font-bold mb-4">
        AI Won’t Replace You
      </h1>

      <p id="content" class="text-gray-600 text-lg">
        But something else will...
      </p>

    </div>

    <!-- CONTROLS -->
    <div class="flex justify-between items-center mt-10">

      <button onclick="prevSlide()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
        ← Prev
      </button>

      <span id="indicator" class="text-sm text-gray-500">1 / 4</span>

      <button onclick="nextSlide()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        Next →
      </button>

    </div>

  </div>

</section>

<!-- FOOTER -->
<footer class="bg-white border-t mt-10">
  <div class="max-w-5xl mx-auto px-4 py-6 text-center">
    <p class="text-gray-600 text-sm">
      © 2026 SCWK — Scrum & Coffee with Karthik
    </p>
  </div>
</footer>

<!-- SCRIPT -->
<script>
  const slides = [
    {
      title: "AI Won’t Replace You",
      content: "But something else will..."
    },
    {
      title: "The Real Threat",
      content: "People who know how to use AI effectively."
    },
    {
      title: "The Shift",
      content: "It’s no longer skill vs no skill."
    },
    {
      title: "The Reality",
      content: "It’s adaptability vs stagnation."
    }
  ];

  let current = 0;

  function updateSlide() {
    document.getElementById("title").innerText = slides[current].title;
    document.getElementById("content").innerText = slides[current].content;
    document.getElementById("indicator").innerText = (current + 1) + " / " + slides.length;
  }

  function nextSlide() {
    if (current < slides.length - 1) {
      current++;
      updateSlide();
    }
  }

  function prevSlide() {
    if (current > 0) {
      current--;
      updateSlide();
    }
  }
</script>

</body>
</html>
