<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dose</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-gray-100 font-sans">

<nav class="bg-white shadow px-6 py-3 flex justify-between">
  <img src="logo.png" class="h-10">
  <a href="index.html" class="text-blue-600">Home</a>
</nav>

<section class="text-center mt-10">
  <h1 class="text-3xl font-bold">📘 Dose</h1>
</section>

<div id="posts" class="max-w-3xl mx-auto mt-10 space-y-6 px-4"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("posts");

fetch("data.json")
.then(res => res.json())
.then(data => {

  data.posts
    .filter(p => p.type === "dose")
    .reverse()
    .forEach(post => {

      const card = document.createElement("div");
      card.className = "bg-white rounded-xl shadow overflow-hidden cursor-pointer hover:shadow-lg";

      const preview = document.createElement("div");
      preview.className = "h-64 flex justify-center items-center bg-gray-200";

      const canvas = document.createElement("canvas");
      preview.appendChild(canvas);

      const content = document.createElement("div");
      content.className = "p-4";
      content.innerHTML = `
        <h2 class="font-semibold text-lg">${post.title}</h2>
        <div class="text-blue-600 mt-2">View Carousel →</div>
      `;

      card.appendChild(preview);
      card.appendChild(content);

      card.onclick = () => {
        window.location.href = `carousel.html?id=${post.id}`;
      };

      container.appendChild(card);

      pdfjsLib.getDocument(post.file).promise
      .then(pdf => pdf.getPage(1))
      .then(page => {
        const viewport = page.getViewport({ scale: 1 });
        const scale = 300 / viewport.width;
        const vp = page.getViewport({ scale });

        const ctx = canvas.getContext("2d");
        canvas.width = vp.width;
        canvas.height = vp.height;

        page.render({ canvasContext: ctx, viewport: vp });
      });

    });

});
</script>

</body>
</html>
