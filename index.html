<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCWK</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .carousel-slide {
      min-width: 100%;
      flex-shrink: 0;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 6px;
      z-index: 10;
    }
    .dot.active {
      background-color: #2563eb;
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center sticky top-0 z-50">
  <img src="logo.png" class="h-10">
  <div class="space-x-6 font-medium">
    <a href="#" class="text-blue-600">Home</a>
    <a href="#">Bites</a>
    <a href="#">Dose</a>
  </div>
</nav>

<!-- HERO -->
<section class="text-center mt-16 px-4">
  <h1 class="text-4xl font-bold mb-3">⚡ SCWK</h1>
  <p class="text-lg text-gray-600 max-w-xl mx-auto">
    AI won’t replace you. But someone using it will.
  </p>
</section>

<!-- CAROUSEL -->
<section class="max-w-5xl mx-auto mt-14 px-4">

  <h2 class="text-2xl font-semibold mb-6">🔥 Latest Dose</h2>

  <div class="relative overflow-hidden">

    <div class="carousel-track" id="track">
      <!-- Slides will be injected -->
    </div>

    <!-- Arrows -->
    <button class="carousel-btn left-2" id="prev">‹</button>
    <button class="carousel-btn right-2" id="next">›</button>

  </div>

  <!-- Dots -->
  <div id="dots" class="flex justify-center mt-4 gap-2"></div>

</section>

<!-- FOOTER -->
<footer class="bg-white mt-16 border-t text-center py-6 text-sm text-gray-600">
  © 2026 SCWK — Scrum & Coffee with Karthik
</footer>

<script>
/* ===========================
   CONFIG (JUST CHANGE THIS)
=========================== */
const pdfFile = "ai-shot-1.pdf"; // your PDF
const totalPages = 3; // 👈 ONLY thing you update per content

/* ===========================
   INIT
=========================== */
const track = document.getElementById("track");
const dotsContainer = document.getElementById("dots");

let currentIndex = 0;
let slides = [];

/* ===========================
   CREATE SLIDES
=========================== */
for (let i = 1; i <= totalPages; i++) {
  const slide = document.createElement("div");
  slide.className = "carousel-slide";

  slide.innerHTML = `
    <embed src="${pdfFile}#page=${i}" type="application/pdf"
      class="w-full h-[520px] rounded-xl shadow-sm">
  `;

  track.appendChild(slide);

  // dot
  const dot = document.createElement("span");
  dot.className = "dot w-3 h-3 bg-gray-400 rounded-full cursor-pointer";
  dot.addEventListener("click", () => goToSlide(i - 1));
  dotsContainer.appendChild(dot);
}

slides = Array.from(track.children);
const dots = Array.from(dotsContainer.children);

/* ===========================
   FUNCTIONS
=========================== */
function updateSlide(index) {
  const width = slides[0].getBoundingClientRect().width;
  track.style.transform = `translateX(-${index * width}px)`;

  dots.forEach((d, i) => {
    d.classList.toggle("active", i === index);
  });
}

function goToSlide(index) {
  currentIndex = index;
  updateSlide(currentIndex);
}

/* ===========================
   BUTTONS
=========================== */
document.getElementById("next").onclick = () => {
  currentIndex = (currentIndex + 1) % slides.length;
  updateSlide(currentIndex);
};

document.getElementById("prev").onclick = () => {
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  updateSlide(currentIndex);
};

/* ===========================
   SWIPE
=========================== */
let startX = 0;

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) {
    document.getElementById("next").click();
  } else if (endX > startX + 50) {
    document.getElementById("prev").click();
  }
});

/* ===========================
   INIT LOAD
=========================== */
updateSlide(currentIndex);

window.addEventListener("resize", () => updateSlide(currentIndex));
</script>

</body>
</html>
