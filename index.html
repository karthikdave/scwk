<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCWK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Carousel styles */
    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .carousel-slide {
      min-width: 100%;
      flex-shrink: 0;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 5px 12px;
      cursor: pointer;
      z-index: 10;
      border-radius: 0.25rem;
    }
    .dots .dot.active {
      background-color: #2563eb; /* Tailwind blue-600 */
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <img src="logo.png" alt="SCWK Logo" class="h-10 w-auto">
  </div>
  <div class="space-x-6 text-gray-700 font-medium">
    <a href="index.html" class="text-blue-600 font-semibold">Home</a>
    <a href="post1.html" class="hover:text-blue-600">AI Shots</a>
    <a href="scwk-dose.html" class="hover:text-blue-600">SCWK Dose</a>
    <a href="about.html" class="hover:text-blue-600">About</a>
  </div>
</nav>

<!-- HERO -->
<section class="text-center mt-16 px-4">
  <h1 class="text-4xl font-bold mb-3">⚡ SCWK</h1>
  <p class="text-lg text-gray-600 max-w-xl mx-auto">
    Scrum & Coffee with Karthik — where AI meets Agile with sharp, practical insights.
  </p>
</section>

<!-- PDF CAROUSEL -->
<section class="max-w-5xl mx-auto mt-14 px-4">
  <h2 class="text-2xl font-semibold mb-4">SCWK PDF Carousel</h2>

  <div class="relative overflow-hidden">
    <div class="carousel-track">
      <!-- PDF slides -->
      <div class="carousel-slide">
        <embed src="SCWK_Carousel.pdf#page=1" type="application/pdf" class="w-full h-[500px] rounded-xl shadow-sm">
      </div>
      <div class="carousel-slide">
        <embed src="SCWK_Carousel.pdf#page=2" type="application/pdf" class="w-full h-[500px] rounded-xl shadow-sm">
      </div>
      <div class="carousel-slide">
        <embed src="SCWK_Carousel.pdf#page=3" type="application/pdf" class="w-full h-[500px] rounded-xl shadow-sm">
      </div>
      <!-- Add more pages as needed -->
    </div>

    <!-- Arrows -->
    <button class="carousel-btn prev left-2">‹</button>
    <button class="carousel-btn next right-2">›</button>

    <!-- Dots -->
    <div class="dots flex justify-center mt-4 gap-2">
      <span class="dot w-3 h-3 bg-gray-400 rounded-full cursor-pointer"></span>
      <span class="dot w-3 h-3 bg-gray-400 rounded-full cursor-pointer"></span>
      <span class="dot w-3 h-3 bg-gray-400 rounded-full cursor-pointer"></span>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-white mt-16 border-t">
  <div class="max-w-5xl mx-auto px-4 py-8 text-center">
    <p class="text-gray-600 text-sm">
      © 2026 SCWK — Scrum & Coffee with Karthik
    </p>
    <p class="text-gray-500 text-xs mt-2">
      Built with clarity. Powered by consistency.
    </p>
  </div>
</footer>

<!-- Carousel JS -->
<script>
const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextBtn = document.querySelector('.carousel-btn.next');
const prevBtn = document.querySelector('.carousel-btn.prev');
const dots = document.querySelectorAll('.dot');
let currentIndex = 0;

function updateSlide(index) {
  const slideWidth = slides[0].getBoundingClientRect().width;
  track.style.transform = `translateX(-${index * slideWidth}px)`;
  dots.forEach((dot,i)=>dot.classList.toggle('active', i===index));
}

// Arrow navigation
nextBtn.addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % slides.length;
  updateSlide(currentIndex);
});
prevBtn.addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  updateSlide(currentIndex);
});

// Dot navigation
dots.forEach((dot,i) => dot.addEventListener('click', () => {
  currentIndex = i;
  updateSlide(currentIndex);
}));

// Swipe support
let startX = 0;
track.addEventListener('touchstart', e => startX = e.touches[0].clientX);
track.addEventListener('touchend', e => {
  const endX = e.changedTouches[0].clientX;
  if(endX < startX - 50) nextBtn.click();
  else if(endX > startX + 50) prevBtn.click();
});

// Initial render
updateSlide(currentIndex);

// Update on resize
window.addEventListener('resize', () => updateSlide(currentIndex));
</script>

</body>
</html>
