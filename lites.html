<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lites | SCWK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(to bottom, #eff6ff, #ffffff);
}

/* Card */
.card {
  position: relative;
  cursor: pointer;
  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* Image */
.card img {
  width: 100%;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Overlay (same as bites — consistency) */
.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;

  background: rgba(0,0,0,0.75);
  color: white;

  padding: 12px;
  border-radius: 0 0 14px 14px;
}
</style>
</head>

<body class="text-gray-900 font-sans">

<!-- HEADER -->
<header class="bg-white/90 backdrop-blur sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-6 py-4 text-center">

    <div class="flex justify-center mb-3">
      <img src="images/logo.png" class="h-14 md:h-16" alt="SCWK Logo">
    </div>

    <nav class="flex justify-center gap-4 text-sm">
      <a href="index.html" class="px-4 py-2 rounded-full hover:bg-blue-100">Home</a>
      <a href="bites.html" class="px-4 py-2 rounded-full hover:bg-blue-100">Bites</a>
      <a href="lites.html" class="px-4 py-2 rounded-full bg-blue-100 text-blue-700 font-semibold">Lites</a>
      <a href="about.html" class="px-4 py-2 rounded-full hover:bg-blue-100">About</a>
    </nav>

  </div>
</header>

<!-- TITLE -->
<section class="max-w-5xl mx-auto px-6 pt-24 pb-10 text-center">
  <h1 class="text-4xl font-bold mb-4">Lites</h1>
  <p class="text-gray-600 max-w-xl mx-auto">
    Simple breakdowns that make complex Scrum problems suddenly obvious.
  </p>
</section>

<!-- GRID -->
<section class="max-w-5xl mx-auto px-6 pb-20">
  <div id="litesGrid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<!-- FOOTER -->
<section class="py-10 text-center text-sm text-gray-400">
  Scrum & Coffee with Karthik • SCWK © 2026
</section>

<!-- SCRIPT -->
<script>
const repoOwner = "karthikdave";
const repoName = "scwk";
const branch = "main";

const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/images/lites?ref=${branch}`;

fetch(apiUrl)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("litesGrid");

  const folders = data
    .filter(item => item.type === "dir")
    .sort((a, b) => b.name.localeCompare(a.name));

  folders.forEach(folder => {

    const folderName = folder.name;
    const imagePath = `images/lites/${folderName}/l1.png`;

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      location.href = `carousel.html?folder=lites/${folderName}`;
    };

    // fetch title.txt
    fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/images/lites/${folderName}/title.txt?ref=${branch}`)
    .then(res => res.json())
    .then(file => {
      const title = atob(file.content).trim();

      card.innerHTML = `
        <img src="${imagePath}">
        <div class="overlay">
          <h3 class="text-lg font-semibold">${title}</h3>
        </div>
      `;
    })
    .catch(() => {
      const fallback = folderName.replace("lites-", "Lite ");
      card.innerHTML = `
        <img src="${imagePath}">
        <div class="overlay">
          <h3 class="text-lg font-semibold">${fallback}</h3>
        </div>
      `;
    });

    grid.appendChild(card);

  });

});
</script>

</body>
</html>
