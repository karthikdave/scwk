<!-- Title loader -->
<script>
async function loadTitle(id) {
  try {
    const res = await fetch(`images/lites/lites-${id}/title.txt`);
    if (!res.ok) return;
    const text = await res.text();
    const el = document.getElementById(`title-${id}`);
    if (el && text.trim()) el.innerText = text.trim();
  } catch {}
}

["006","005","004","003","002","001"].forEach(loadTitle);
</script>

<!-- Scroll fix -->
<script>
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}

window.addEventListener('load', () => {
  setTimeout(() => {
    window.scrollTo(0, 0);
  }, 0);
});
</script>
