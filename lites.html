<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lites | SCWK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: linear-gradient(to bottom, #ecfeff, #ffffff);
  }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: 18px;
    cursor: pointer;
  }

  .card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover img {
    transform: scale(1.04);
  }

  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 18px;
    background: linear-gradient(
      to top,
      rgba(255,255,255,0.95),
      rgba(255,255,255,0.75),
      transparent
    );
  }

  .overlay h3 {
    color: #111827;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
</style>

</head>

<body class="text-gray-900 font-sans">

<header class="bg-white/90 backdrop-blur sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-6 py-4 text-center">

    <div class="flex justify-center mb-3">
      <img src="images/logo.png" class="h-14 md:h-16" alt="SCWK Logo">
    </div>

    <nav class="flex justify-center gap-4 text-sm">
      <a href="index.html" class="px-4 py-2 rounded-full hover:bg-cyan-100">Home</a>
      <a href="bites.html" class="px-4 py-2 rounded-full hover:bg-cyan-100">Bites</a>
      <a href="lites.html" class="px-4 py-2 rounded-full bg-cyan-100 text-cyan-700 font-semibold">Lites</a>
      <a href="about.html" class="px-4 py-2 rounded-full hover:bg-cyan-100">About</a>
    </nav>

  </div>
</header>

<section class="max-w-5xl mx-auto px-6 pt-24 pb-10 text-center">
  <h1 class="text-4xl font-bold mb-4">Lites</h1>

  <p class="text-gray-600 max-w-xl mx-auto">
    Visual breakdowns of ideas that make you pause, reflect, and rethink how teams work.
  </p>
</section>

<section class="max-w-5xl mx-auto px-6 pb-20">
  <div id="litesGrid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<section class="py-10 text-center text-sm text-gray-400">
  Scrum & Coffee with Karthik • SCWK © 2026
</section>

<script>
const repoOwner = "karthikdave";
const repoName = "scwk";
const branch = "main";

const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/images/lites?ref=${branch}`;

fetch(apiUrl)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("litesGrid");

  const folders = data
    .filter(item => item.type === "dir")
    .sort((a, b) => b.name.localeCompare(a.name));

  folders.forEach(folder => {

    const folderName = folder.name;
    const imagePath = `images/lites/${folderName}/l1.png`;
    const title = folderName.replace("lites-", "Lite ");

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      location.href = `carousel.html?folder=lites/${folderName}`;
    };

    card.innerHTML = `
      <img src="${imagePath}">
      <div class="overlay">
        <h3 class="text-lg font-semibold">${title}</h3>
      </div>
    `;

    grid.appendChild(card);

  });

});
</script>

</body>
</html>
