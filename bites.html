<script>
const repoOwner = "karthikdave";
const repoName = "scwk";
const branch = "main";

const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/images/bites?ref=${branch}`;

fetch(apiUrl)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("bitesGrid");

  const folders = data
    .filter(item => item.type === "dir")
    .sort((a, b) => b.name.localeCompare(a.name));

  folders.forEach(folder => {

    const folderName = folder.name;
    const imagePath = `images/bites/${folderName}/b1.png`;

    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      location.href = `carousel.html?folder=bites/${folderName}`;
    };

    // 👉 fetch title.txt
    fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/images/bites/${folderName}/title.txt?ref=${branch}`)
    .then(res => res.json())
    .then(file => {
      const title = atob(file.content).trim();

      card.innerHTML = `
        <img src="${imagePath}">
        <div class="overlay">
          <h3 class="text-lg font-semibold">${title}</h3>
        </div>
      `;
    })
    .catch(() => {
      // fallback
      const title = folderName.replace("bites-", "Bite ");
      card.innerHTML = `
        <img src="${imagePath}">
        <div class="overlay">
          <h3 class="text-lg font-semibold">${title}</h3>
        </div>
      `;
    });

    grid.appendChild(card);

  });

});
</script>
