<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bites | SCWK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: linear-gradient(to bottom, #eff6ff, #ffffff);
  }

  .card-hover {
    transition: all 0.25s ease;
  }

  .card-hover:hover {
    transform: translateY(-6px) scale(1.02);
  }
</style>

</head>

<body class="text-gray-900 font-sans">

<header class="bg-white/90 backdrop-blur sticky top-0 z-50 border-b">
  <div class="max-w-6xl mx-auto px-6 py-4 text-center">

    <div class="flex justify-center mb-3">
      <img src="images/logo.png" class="h-14 md:h-16" alt="SCWK Logo">
    </div>

    <nav class="flex justify-center gap-4 text-sm">
      <a href="index.html" class="px-4 py-2 rounded-full hover:bg-blue-100">Home</a>
      <a href="bites.html" class="px-4 py-2 rounded-full bg-blue-100 text-blue-700 font-semibold">Bites</a>
      <a href="lites.html" class="px-4 py-2 rounded-full hover:bg-blue-100">Lites</a>
      <a href="about.html" class="px-4 py-2 rounded-full hover:bg-blue-100">About</a>
    </nav>

  </div>
</header>

<section class="max-w-5xl mx-auto px-6 pt-24 pb-10 text-center">
  <h1 class="text-4xl font-bold mb-4">Bites</h1>

  <p class="text-gray-600 max-w-xl mx-auto">
    Sharp moments where you realise something in your team isn’t working the way you think.
  </p>
</section>

<section class="max-w-5xl mx-auto px-6 pb-20">
  <div id="bitesGrid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<section class="py-10 text-center text-sm text-gray-400">
  Scrum & Coffee with Karthik • SCWK © 2026
</section>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("bitesGrid");

  data.bites.forEach(bite => {

    const card = document.createElement("div");
    card.className = "cursor-pointer card-hover";

    card.onclick = () => {
      location.href = `carousel.html?folder=${bite.folder}`;
    };

    card.innerHTML = `
      <img src="${bite.image}" class="rounded-xl shadow-md mb-4">
      <h3 class="font-semibold text-lg">
        ${bite.title}
      </h3>
    `;

    grid.appendChild(card);

  });

});
</script>

</body>
</html>
