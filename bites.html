<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCWK Bites</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

<!-- NAV -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center sticky top-0 z-50">
  <img src="logo.png" class="h-10">
  <a href="index.html" class="text-blue-600 font-semibold">Home</a>
</nav>

<!-- HEADER -->
<section class="text-center mt-10 px-4">
  <h1 class="text-3xl font-bold">⚡ SCWK Bites</h1>
  <p class="text-gray-600 mt-2">Quick insights. Sharp learning.</p>
</section>

<!-- POSTS -->
<section class="max-w-3xl mx-auto mt-10 px-4">
  <div id="posts" class="space-y-6"></div>
</section>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("posts");

fetch("data.json")
  .then(res => res.json())
  .then(data => {

    const bites = data.posts.filter(p => p.type === "bites").reverse();

    bites.forEach(post => {

      const card = document.createElement("div");
      card.className = `
        bg-white rounded-2xl shadow-sm overflow-hidden
        hover:shadow-md transition cursor-pointer
      `;

      // Preview container
      const previewDiv = document.createElement("div");
      previewDiv.className = "bg-gray-200 flex justify-center items-center";

      const canvas = document.createElement("canvas");
      previewDiv.appendChild(canvas);

      // Title section
      const content = document.createElement("div");
      content.className = "p-4";

      content.innerHTML = `
        <h2 class="text-lg font-semibold">${post.title}</h2>
        <p class="text-gray-500 text-sm mt-1">SCWK Bites</p>
        <div class="mt-3 text-blue-600 font-medium">View Carousel →</div>
      `;

      card.appendChild(previewDiv);
      card.appendChild(content);

      // Click
      card.onclick = () => {
        window.location.href = `carousel.html?id=${post.id}`;
      };

      container.appendChild(card);

      // 🔥 LOAD FIRST PAGE PREVIEW
      pdfjsLib.getDocument(post.file).promise.then(pdf => {
        pdf.getPage(1).then(page => {

          const viewport = page.getViewport({ scale: 1 });
          const scale = 300 / viewport.width; // fixed preview width
          const scaledViewport = page.getViewport({ scale });

          const context = canvas.getContext("2d");
          canvas.width = scaledViewport.width;
          canvas.height = scaledViewport.height;

          page.render({
            canvasContext: context,
            viewport: scaledViewport
          });
        });
      });

    });
  });
</script>

</body>
</html>
