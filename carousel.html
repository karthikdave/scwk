<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Carousel Viewer</title>
  <meta
    name="description"
    content="Reusable SCWK PDF carousel viewer for SCWK Bites and SCWK Lites."
  />
  <style>
    :root {
      --bg: #07111f;
      --bg-soft: #0d1b2f;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-2: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: #b8c7e0;
      --brand: #3b82f6;
      --brand-2: #60a5fa;
      --brand-dark: #1d4ed8;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius: 20px;
      --radius-sm: 14px;
      --max: 1180px;
      --nav-h: 78px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 35%),
        radial-gradient(circle at bottom left, rgba(96, 165, 250, 0.12), transparent 30%),
        linear-gradient(180deg, #06101d 0%, #081424 55%, #0b1930 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    canvas {
      display: block;
      max-width: 100%;
    }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(14px);
      background: rgba(7, 17, 31, 0.82);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      place-items: center;
      padding: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .brand-text strong {
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: #ffffff;
    }

    .brand-text span {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      transition: 0.25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #fff;
      background: rgba(59, 130, 246, 0.14);
    }

    .menu-btn {
      display: none;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
    }

    .mobile-menu {
      display: none;
      padding: 0 0 18px;
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 10px;
    }

    .mobile-menu a {
      display: block;
      padding: 14px 14px;
      border-radius: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .mobile-menu a:hover,
    .mobile-menu a.active {
      color: #fff;
      background: rgba(59, 130, 246, 0.14);
    }

    main {
      padding: 44px 0 72px;
    }

    .viewer-shell {
      display: grid;
      gap: 22px;
    }

    .hero-panel,
    .viewer-panel,
    .thumbs-panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .hero-panel {
      padding: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #cfe1ff;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.2);
      margin-bottom: 14px;
    }

    .hero-panel h1 {
      font-size: clamp(1.8rem, 3.6vw, 3rem);
      line-height: 1.1;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }

    .hero-panel p {
      color: var(--muted);
      max-width: 72ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-weight: 700;
      font-size: 0.95rem;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.34);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    .viewer-panel {
      padding: 22px;
    }

    .viewer-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .viewer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .meta-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8e7ff;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .viewer-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .viewer-frame {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 18px;
      min-height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .canvas-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      overflow: auto;
    }

    #pdfCanvas {
      width: 100%;
      max-width: 900px;
      height: auto;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
    }

    .status {
      text-align: center;
      color: var(--muted);
      padding: 18px;
    }

    .thumbs-panel {
      padding: 22px;
    }

    .thumbs-panel h2 {
      font-size: 1.15rem;
      margin-bottom: 14px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
    }

    .thumb-btn {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
      color: #fff;
      cursor: pointer;
      transition: 0.25s ease;
      text-align: left;
    }

    .thumb-btn:hover,
    .thumb-btn.active {
      border-color: rgba(96, 165, 250, 0.4);
      background: rgba(59, 130, 246, 0.12);
      transform: translateY(-1px);
    }

    .thumb-btn strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .thumb-btn span {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .site-footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 24px 0 36px;
      background: rgba(5, 12, 22, 0.35);
      backdrop-filter: blur(10px);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-left {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-links a {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .footer-links a:hover {
      color: #fff;
    }

    @media (max-width: 860px) {
      .nav-links {
        display: none;
      }

      .menu-btn {
        display: inline-flex;
      }

      .hero-panel,
      .viewer-panel,
      .thumbs-panel {
        padding: 20px;
      }

      .viewer-toolbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 560px) {
      .container {
        width: min(100% - 20px, var(--max));
      }

      .brand-text strong {
        font-size: 0.88rem;
      }

      .brand-text span {
        font-size: 0.72rem;
      }

      .hero-actions,
      .viewer-controls {
        width: 100%;
      }

      .hero-actions .btn,
      .viewer-controls .btn {
        flex: 1 1 100%;
      }

      .viewer-frame {
        padding: 12px;
        min-height: 320px;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="SCWK Home">
          <div class="brand-logo">
            <img src="logo.png" alt="SCWK logo" />
          </div>
          <div class="brand-text">
            <strong>SCWK</strong>
            <span>Scrum &amp; Coffee with Karthik</span>
          </div>
        </a>

        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="carousel.html?id=bites" id="navBites">SCWK Bites</a>
          <a href="carousel.html?id=lites" id="navLites">SCWK Lites</a>
        </div>

        <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          ☰
        </button>
      </nav>

      <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-panel">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="carousel.html?id=bites" id="mobileBites">SCWK Bites</a>
          <a href="carousel.html?id=lites" id="mobileLites">SCWK Lites</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="viewer-shell">
        <div class="hero-panel">
          <div class="eyebrow" id="viewerEyebrow">SCWK Viewer</div>
          <h1 id="viewerTitle">Loading...</h1>
          <p id="viewerDescription">
            Preparing the carousel viewer.
          </p>

          <div class="hero-actions">
            <a class="btn btn-secondary" href="index.html">Home</a>
            <a class="btn btn-secondary" href="about.html">About</a>
            <a class="btn btn-primary" id="downloadBtn" href="#" target="_blank" rel="noopener">Open PDF</a>
          </div>
        </div>

        <div class="viewer-panel">
          <div class="viewer-toolbar">
            <div class="viewer-meta">
              <div class="meta-pill" id="pageIndicator">Page 0 / 0</div>
              <div class="meta-pill" id="docLabel">Document</div>
            </div>

            <div class="viewer-controls">
              <button class="btn btn-secondary" id="prevBtn" type="button">Previous</button>
              <button class="btn btn-secondary" id="nextBtn" type="button">Next</button>
            </div>
          </div>

          <div class="viewer-frame">
            <div class="canvas-wrap" id="canvasWrap">
              <canvas id="pdfCanvas"></canvas>
            </div>
            <div class="status" id="statusText">Loading PDF...</div>
          </div>
        </div>

        <div class="thumbs-panel">
          <h2>Quick Navigation</h2>
          <div class="thumbs" id="thumbs"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-left">© 2026 SCWK · Scrum &amp; Coffee with Karthik</div>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="carousel.html?id=bites">Bites</a>
          <a href="carousel.html?id=lites">Lites</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="lib/pdfjs/pdf.min.js"></script>
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    menuBtn.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      menuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      menuBtn.textContent = isOpen ? '✕' : '☰';
    });

    document.querySelectorAll('#mobileMenu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        menuBtn.setAttribute('aria-expanded', 'false');
        menuBtn.textContent = '☰';
      });
    });

    const CONFIG = {
      bites: {
        title: 'SCWK Bites',
        eyebrow: 'SCWK Bites',
        description: 'Quick, sharp, and actionable carousel learning designed for fast professional value.',
        pdf: 'pdf/bites.pdf'
      },
      lites: {
        title: 'SCWK Lites',
        eyebrow: 'SCWK Lites',
        description: 'Lightweight but meaningful carousel learning built for clarity, reflection, and depth.',
        pdf: 'pdf/lites.pdf'
      }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const docConfig = CONFIG[id] || CONFIG.bites;

    const viewerEyebrow = document.getElementById('viewerEyebrow');
    const viewerTitle = document.getElementById('viewerTitle');
    const viewerDescription = document.getElementById('viewerDescription');
    const downloadBtn = document.getElementById('downloadBtn');
    const docLabel = document.getElementById('docLabel');
    const pageIndicator = document.getElementById('pageIndicator');
    const statusText = document.getElementById('statusText');
    const pdfCanvas = document.getElementById('pdfCanvas');
    const thumbs = document.getElementById('thumbs');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const navBites = document.getElementById('navBites');
    const navLites = document.getElementById('navLites');
    const mobileBites = document.getElementById('mobileBites');
    const mobileLites = document.getElementById('mobileLites');

    viewerEyebrow.textContent = docConfig.eyebrow;
    viewerTitle.textContent = docConfig.title;
    viewerDescription.textContent = docConfig.description;
    downloadBtn.href = docConfig.pdf;
    docLabel.textContent = docConfig.title;
    document.title = docConfig.title + ' | SCWK';

    if (id === 'lites') {
      navLites.classList.add('active');
      mobileLites.classList.add('active');
    } else {
      navBites.classList.add('active');
      mobileBites.classList.add('active');
    }

    if (!window.pdfjsLib) {
      statusText.textContent = 'PDF viewer failed to initialize. Check lib/pdfjs/pdf.min.js path.';
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      throw new Error('pdfjsLib not found. Check lib/pdfjs/pdf.min.js path.');
    }

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdfjs/pdf.worker.min.js';

    let pdfDoc = null;
    let currentPage = 1;
    let isRendering = false;
    let pendingPage = null;

    const ctx = pdfCanvas.getContext('2d');

    function setStatus(message, show = true) {
      statusText.textContent = message;
      statusText.style.display = show ? 'block' : 'none';
    }

    function updatePageIndicator() {
      const total = pdfDoc ? pdfDoc.numPages : 0;
      pageIndicator.textContent = `Page ${currentPage} / ${total}`;
      updateThumbStates();
    }

    function updateButtons() {
      const total = pdfDoc ? pdfDoc.numPages : 0;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= total;
      prevBtn.style.opacity = prevBtn.disabled ? '0.55' : '1';
      nextBtn.style.opacity = nextBtn.disabled ? '0.55' : '1';
      prevBtn.style.pointerEvents = prevBtn.disabled ? 'none' : 'auto';
      nextBtn.style.pointerEvents = nextBtn.disabled ? 'none' : 'auto';
    }

    function updateThumbStates() {
      document.querySelectorAll('.thumb-btn').forEach(btn => {
        const page = Number(btn.dataset.page);
        btn.classList.toggle('active', page === currentPage);
      });
    }

    function renderPage(pageNum) {
      isRendering = true;
      setStatus(`Rendering page ${pageNum}...`, true);

      pdfDoc.getPage(pageNum).then(page => {
        const containerWidth = Math.min(window.innerWidth - 90, 900);
        const unscaledViewport = page.getViewport({ scale: 1 });
        const scale = containerWidth / unscaledViewport.width;
        const viewport = page.getViewport({ scale });

        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        return page.render(renderContext).promise;
      }).then(() => {
        isRendering = false;
        currentPage = pageNum;
        updatePageIndicator();
        updateButtons();
        setStatus('', false);

        if (pendingPage !== null) {
          const nextPending = pendingPage;
          pendingPage = null;
          renderPage(nextPending);
        }
      }).catch(error => {
        console.error('Render error:', error);
        isRendering = false;
        setStatus('Failed to render PDF page.', true);
      });
    }

    function queueRenderPage(pageNum) {
      if (!pdfDoc) return;
      if (pageNum < 1 || pageNum > pdfDoc.numPages) return;

      if (isRendering) {
        pendingPage = pageNum;
      } else {
        renderPage(pageNum);
      }
    }

    function buildThumbs(totalPages) {
      thumbs.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'thumb-btn';
        btn.dataset.page = i;
        btn.innerHTML = `
          <strong>Page ${i}</strong>
          <span>${docConfig.title}</span>
        `;
        btn.addEventListener('click', () => queueRenderPage(i));
        thumbs.appendChild(btn);
      }
      updateThumbStates();
    }

    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) queueRenderPage(currentPage - 1);
    });

    nextBtn.addEventListener('click', () => {
      if (pdfDoc && currentPage < pdfDoc.numPages) queueRenderPage(currentPage + 1);
    });

    window.addEventListener('resize', () => {
      if (pdfDoc) {
        queueRenderPage(currentPage);
      }
    });

    pdfjsLib.getDocument(docConfig.pdf).promise
      .then(doc => {
        pdfDoc = doc;
        buildThumbs(pdfDoc.numPages);
        updateButtons();
        updatePageIndicator();
        renderPage(currentPage);
      })
      .catch(error => {
        console.error('PDF load error:', error);
        setStatus(
          'Unable to load PDF. Verify these files exist exactly: ' +
          docConfig.pdf +
          ' and lib/pdfjs/pdf.worker.min.js',
          true
        );
        prevBtn.disabled = true;
        nextBtn.disabled = true;
      });
  </script>
</body>
</html>
