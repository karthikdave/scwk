<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Carousel Viewer</title>
  <meta
    name="description"
    content="SCWK dedicated PDF carousel viewer for Bites and Lites."
  />
  <style>
    :root {
      --bg: #f5f8ff;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --primary: #0b3d91;
      --primary-dark: #072b67;
      --primary-soft: #dfeeff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe7ff;
      --shadow: 0 18px 50px rgba(11, 61, 145, 0.08);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.08);
      --max-width: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
      color: var(--text);
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(14px);
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(219, 231, 255, 0.9);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 86px;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--text);
      min-width: 0;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #d9e8ff;
      box-shadow: 0 10px 24px rgba(11, 61, 145, 0.1);
      padding: 8px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .brand-kicker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .brand-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links a {
      color: #1e293b;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-links a:hover {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .mobile-toggle {
      display: none;
      width: 48px;
      height: 48px;
      border: 1px solid #d9e8ff;
      background: #ffffff;
      border-radius: 14px;
      cursor: pointer;
      padding: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 8px 18px rgba(11, 61, 145, 0.08);
    }

    .mobile-toggle span {
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: var(--primary);
      display: block;
    }

    .mobile-menu {
      display: none;
      padding: 0 0 18px;
    }

    .mobile-menu.open {
      display: block;
    }

    .mobile-menu-inner {
      display: grid;
      gap: 10px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
    }

    .mobile-menu a {
      color: #1e293b;
      font-weight: 700;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f8fbff;
      border: 1px solid #e8f0ff;
    }

    .viewer-page {
      padding: 34px 0 54px;
    }

    .viewer-shell {
      background: linear-gradient(135deg, #ffffff 0%, #f6faff 100%);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .viewer-head {
      text-align: center;
      margin-bottom: 18px;
    }

    .viewer-head .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef5ff;
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #d9e8ff;
      margin-bottom: 14px;
    }

    .viewer-head h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      color: var(--text);
    }

    .viewer-head p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .status {
      text-align: center;
      min-height: 24px;
      margin-bottom: 18px;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
    }

    .status.error {
      color: #b91c1c;
    }

    .canvas-frame {
      width: 100%;
      background: #e9f1ff;
      border: 1px solid #d9e8ff;
      border-radius: 24px;
      padding: 16px;
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    .controls {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #1d5fd1 100%);
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(11, 61, 145, 0.2);
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid #d9e8ff;
      box-shadow: 0 10px 20px rgba(11, 61, 145, 0.08);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .page-indicator {
      min-width: 120px;
      text-align: center;
      font-weight: 800;
      color: var(--text);
      padding: 0 8px;
    }

    .site-footer {
      border-top: 1px solid rgba(219, 231, 255, 0.9);
      background: rgba(255, 255, 255, 0.92);
      padding: 22px 0;
      margin-top: 18px;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-brand {
      color: var(--text);
      font-weight: 800;
      font-size: 15px;
    }

    .footer-copy {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .nav-links {
        display: none;
      }

      .mobile-toggle {
        display: inline-flex;
      }

      .nav {
        min-height: 78px;
      }

      .brand-logo {
        width: 56px;
        height: 56px;
      }

      .brand-title {
        font-size: 17px;
        white-space: normal;
      }

      .viewer-page {
        padding-top: 24px;
      }

      .viewer-shell {
        padding: 20px;
      }

      .canvas-frame {
        min-height: 320px;
        padding: 10px;
      }
    }

    @media (max-width: 560px) {
      .container {
        width: min(var(--max-width), calc(100% - 20px));
      }

      .brand {
        gap: 10px;
      }

      .brand-logo {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        padding: 7px;
      }

      .brand-kicker {
        font-size: 11px;
      }

      .brand-title {
        font-size: 15px;
      }

      .viewer-shell {
        border-radius: 22px;
      }

      .controls {
        flex-direction: column;
      }

      .controls .btn {
        width: 100%;
      }

      .page-indicator {
        order: -1;
      }

      .footer-inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav">
        <a class="brand" href="index.html" aria-label="SCWK Home">
          <img src="logo.png" alt="SCWK Logo" class="brand-logo" />
          <span class="brand-text">
            <span class="brand-kicker">SCWK</span>
            <span class="brand-title">Scrum &amp; Coffee with Karthik</span>
          </span>
        </a>

        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
        </div>

        <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobileMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>

      <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-inner">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
        </div>
      </div>
    </div>
  </header>

  <main class="viewer-page">
    <div class="container">
      <section class="viewer-shell">
        <div class="viewer-head">
          <div class="eyebrow">SCWK Carousel Viewer</div>
          <h1 id="viewerTitle">Loading...</h1>
          <p id="viewerSubtitle">Preparing your page-by-page carousel experience.</p>
        </div>

        <div id="status" class="status">Loading PDF document...</div>

        <div class="canvas-frame">
          <canvas id="pdfCanvas"></canvas>
        </div>

        <div class="controls">
          <button id="prevBtn" class="btn btn-secondary" disabled>Previous</button>
          <div id="pageIndicator" class="page-indicator">Page 0 / 0</div>
          <button id="nextBtn" class="btn btn-primary" disabled>Next</button>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">SCWK • Scrum &amp; Coffee with Karthik</div>
        <div class="footer-copy">Built for a clean, modern, premium carousel experience.</div>
      </div>
    </div>
  </footer>

  <script>
    const mobileToggle = document.getElementById("mobileToggle");
    const mobileMenu = document.getElementById("mobileMenu");

    mobileToggle.addEventListener("click", () => {
      const isOpen = mobileMenu.classList.toggle("open");
      mobileToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    document.querySelectorAll("#mobileMenu a").forEach((link) => {
      link.addEventListener("click", () => {
        mobileMenu.classList.remove("open");
        mobileToggle.setAttribute("aria-expanded", "false");
      });
    });
  </script>

  <!-- PDF.js CDN (stable and matched worker version) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const config = {
      bites: {
        title: "SCWK Bites",
        subtitle: "A focused, page-by-page carousel experience for quick and practical insights.",
        path: "pdf/bites.pdf"
      },
      lites: {
        title: "SCWK Lites",
        subtitle: "A clean, premium carousel flow with a lighter reading rhythm.",
        path: "pdf/lites.pdf"
      }
    };

    const viewerTitle = document.getElementById("viewerTitle");
    const viewerSubtitle = document.getElementById("viewerSubtitle");
    const statusEl = document.getElementById("status");
    const pageIndicator = document.getElementById("pageIndicator");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");
    const canvasFrame = document.querySelector(".canvas-frame");

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isRendering = false;
    let pendingPage = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function updateControls() {
      prevBtn.disabled = !pdfDoc || currentPage <= 1 || isRendering;
      nextBtn.disabled = !pdfDoc || currentPage >= totalPages || isRendering;
      pageIndicator.textContent = `Page ${currentPage} / ${totalPages}`;
    }

    function getScale(baseViewport) {
      const availableWidth = Math.max(canvasFrame.clientWidth - 32, 320);
      return availableWidth / baseViewport.width;
    }

    function renderPage(pageNumber) {
      isRendering = true;
      updateControls();
      setStatus(`Rendering page ${pageNumber}...`);

      pdfDoc.getPage(pageNumber).then((page) => {
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = getScale(baseViewport);
        const viewport = page.getViewport({ scale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderTask = page.render({
          canvasContext: ctx,
          viewport: viewport
        });

        return renderTask.promise;
      }).then(() => {
        isRendering = false;
        setStatus("PDF loaded successfully.");
        updateControls();

        if (pendingPage !== null) {
          const nextPage = pendingPage;
          pendingPage = null;
          renderPage(nextPage);
        }
      }).catch((error) => {
        console.error("Render error:", error);
        setStatus("PDF page render failed. Press F12 and share the red console error.", true);
      });
    }

    function queueRender(pageNumber) {
      if (isRendering) {
        pendingPage = pageNumber;
      } else {
        renderPage(pageNumber);
      }
    }

    function goPrev() {
      if (!pdfDoc || currentPage <= 1) return;
      currentPage--;
      queueRender(currentPage);
    }

    function goNext() {
      if (!pdfDoc || currentPage >= totalPages) return;
      currentPage++;
      queueRender(currentPage);
    }

    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);

    window.addEventListener("resize", () => {
      if (pdfDoc) {
        queueRender(currentPage);
      }
    });

    async function initViewer() {
      if (!config[id]) {
        viewerTitle.textContent = "Invalid Carousel";
        viewerSubtitle.textContent = "Use ?id=bites or ?id=lites in the URL.";
        setStatus("Invalid carousel ID.", true);
        updateControls();
        return;
      }

      const selected = config[id];
      viewerTitle.textContent = selected.title;
      viewerSubtitle.textContent = selected.subtitle;

      try {
        if (!window.pdfjsLib) {
          throw new Error("pdfjsLib failed to load from CDN.");
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        setStatus("Loading PDF document...");
        const loadingTask = pdfjsLib.getDocument(selected.path);
        pdfDoc = await loadingTask.promise;

        totalPages = pdfDoc.numPages;
        currentPage = 1;
        updateControls();
        renderPage(currentPage);
      } catch (error) {
        console.error("PDF load error:", error);
        setStatus("PDF failed to load. Press F12 and share the red console error.", true);
      }
    }

    initViewer();
  </script>
</body>
</html>
