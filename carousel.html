<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Bites Carousel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      overflow: hidden;
    }

    .viewport {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      border-radius: 1rem;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.35s ease;
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      max-width: 100%;
      flex: 0 0 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .pdf-canvas {
      width: 100%;
      height: auto;
      display: block;
      background: white;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(17, 24, 39, 0.75);
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(17, 24, 39, 0.95);
      transform: translateY(-50%) scale(1.05);
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .prev-btn { left: 0.5rem; }
    .next-btn { right: 0.5rem; }

    .status-box {
      width: 100%;
      max-width: 460px;
      min-height: 320px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 1rem;
      text-align: center;
      color: #6b7280;
    }

    .error-box {
      color: #b91c1c;
      background: #fef2f2;
    }

    .slide-counter {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      color: #4b5563;
      font-weight: 500;
    }

    .dots {
      margin-top: 0.75rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 9999px;
      background: #d1d5db;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dot.active {
      background: #111827;
      transform: scale(1.15);
    }

    .cta-row {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #111827;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .cta-btn:hover {
      background: #000000;
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-6">

  <h1 class="text-2xl md:text-3xl font-bold mb-5 text-center">SCWK Bites</h1>

  <div id="statusBox" class="status-box">Loading SCWK Bites PDF...</div>

  <div id="carouselShell" class="hidden">
    <div class="viewport">
      <button class="nav-btn prev-btn" id="prevBtn" aria-label="Previous slide">&#10094;</button>
      <div class="carousel-track" id="carouselTrack"></div>
      <button class="nav-btn next-btn" id="nextBtn" aria-label="Next slide">&#10095;</button>
    </div>

    <div class="slide-counter" id="slideCounter">Slide 1 of 1</div>
    <div class="dots" id="dotsContainer"></div>
  </div>

  <div class="cta-row">
    <a href="./pdf/bites.pdf" target="_blank" class="cta-btn">Open Full PDF</a>
  </div>

  <script>
    const pdfFile = './pdf/bites.pdf';

    const statusBox = document.getElementById('statusBox');
    const carouselShell = document.getElementById('carouselShell');
    const carouselTrack = document.getElementById('carouselTrack');
    const slideCounter = document.getElementById('slideCounter');
    const dotsContainer = document.getElementById('dotsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let totalSlides = 0;
    let currentSlide = 0;

    function updateCarousel() {
      carouselTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
      slideCounter.textContent = `Slide ${currentSlide + 1} of ${totalSlides}`;

      const dots = dotsContainer.querySelectorAll('.dot');
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlide);
      });

      prevBtn.disabled = currentSlide === 0;
      nextBtn.disabled = currentSlide === totalSlides - 1;
    }

    function createDot(index) {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.setAttribute('aria-label', `Go to slide ${index + 1}`);
      dot.addEventListener('click', () => {
        currentSlide = index;
        updateCarousel();
      });
      return dot;
    }

    async function renderPage(pdf, pageNumber) {
      const page = await pdf.getPage(pageNumber);

      const slide = document.createElement('div');
      slide.className = 'slide';

      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-canvas';

      slide.appendChild(canvas);
      carouselTrack.appendChild(slide);

      const context = canvas.getContext('2d');

      const containerWidth = Math.min(window.innerWidth * 0.9, 460);
      const unscaledViewport = page.getViewport({ scale: 1 });
      const scale = containerWidth / unscaledViewport.width;
      const viewport = page.getViewport({ scale });

      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;

      context.setTransform(dpr, 0, 0, dpr, 0, 0);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }

    async function initCarousel() {
      try {
        if (!window.pdfjsLib) {
          throw new Error('pdfjsLib not loaded');
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loadingTask = pdfjsLib.getDocument(pdfFile);
        const pdf = await loadingTask.promise;

        totalSlides = pdf.numPages;

        if (!totalSlides) {
          throw new Error('PDF has no pages');
        }

        for (let pageNum = 1; pageNum <= totalSlides; pageNum++) {
          await renderPage(pdf, pageNum);
          dotsContainer.appendChild(createDot(pageNum - 1));
        }

        statusBox.classList.add('hidden');
        carouselShell.classList.remove('hidden');

        updateCarousel();
      } catch (error) {
        console.error('PDF carousel failed:', error);
        statusBox.classList.add('error-box');
        statusBox.innerHTML = `
          <div>
            <strong>Failed to load carousel</strong><br><br>
            ${error.message || error}
          </div>
        `;
      }
    }

    prevBtn.addEventListener('click', () => {
      if (currentSlide > 0) {
        currentSlide--;
        updateCarousel();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentSlide < totalSlides - 1) {
        currentSlide++;
        updateCarousel();
      }
    });

    // Swipe support
    let touchStartX = 0;
    let touchEndX = 0;

    carouselTrack.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    carouselTrack.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;

      if (Math.abs(diff) > 40) {
        if (diff > 0 && currentSlide < totalSlides - 1) {
          currentSlide++;
        } else if (diff < 0 && currentSlide > 0) {
          currentSlide--;
        }
        updateCarousel();
      }
    });

    initCarousel();
  </script>

</body>
</html>
