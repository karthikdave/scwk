<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Bites Carousel</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./lib/pdfjs/pdf.min.js"></script>

  <style>
    body {
      overflow-x: hidden;
    }

    .carousel-container {
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      display: flex;
      gap: 1rem;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 0.25rem;
      min-height: 320px;
    }

    .carousel-container::-webkit-scrollbar {
      display: none;
    }

    .carousel-slide {
      scroll-snap-align: center;
      flex: 0 0 auto;
      width: 90vw;
      max-width: 90vw;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      background: white;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .carousel-slide {
        width: 420px;
        max-width: 420px;
      }
    }

    .pdf-wrapper {
      position: relative;
      width: 100%;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    .pdf-canvas {
      width: 100%;
      height: auto;
      display: block;
      background: white;
    }

    .overlay-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .loading-msg {
      color: #6b7280;
      background: #ffffff;
    }

    .error-msg {
      color: #b91c1c;
      background: #fef2f2;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(17, 24, 39, 0.7);
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 9999px;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      border: none;
    }

    .nav-btn:hover {
      background: rgba(17, 24, 39, 0.9);
      transform: translateY(-50%) scale(1.05);
    }

    .prev-btn { left: 0.5rem; }
    .next-btn { right: 0.5rem; }

    @media (min-width: 768px) {
      .prev-btn { left: -3.5rem; }
      .next-btn { right: -3.5rem; }
    }

    .slide-counter {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      color: #4b5563;
      font-weight: 500;
    }

    .cta-row {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #111827;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .cta-btn:hover {
      background: #000000;
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-6">

  <h1 class="text-2xl md:text-3xl font-bold mb-5">SCWK Bites</h1>

  <div class="relative w-full md:w-fit mx-auto">
    <div class="carousel-container" id="carouselContainer"></div>

    <button class="nav-btn prev-btn" aria-label="Previous slide">&#10094;</button>
    <button class="nav-btn next-btn" aria-label="Next slide">&#10095;</button>
  </div>

  <div class="slide-counter" id="slideCounter">Loading...</div>

  <div class="cta-row">
    <a href="./pdf/bites.pdf" target="_blank" class="cta-btn">Open Full PDF</a>
  </div>

  <script>
    const pdfFile = './pdf/bites.pdf';
    const container = document.getElementById('carouselContainer');
    const prevBtn = document.querySelector('.prev-btn');
    const nextBtn = document.querySelector('.next-btn');
    const slideCounter = document.getElementById('slideCounter');

    let totalSlides = 0;

    function createMessageSlide(message, isError = false) {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';

      slide.innerHTML = `
        <div class="pdf-wrapper">
          <div class="overlay-msg ${isError ? 'error-msg' : 'loading-msg'}">
            <div>${message}</div>
          </div>
        </div>
      `;
      return slide;
    }

    function createCanvasSlide(pageNumber) {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';

      slide.innerHTML = `
        <div class="pdf-wrapper">
          <canvas id="pdf-canvas-${pageNumber}" class="pdf-canvas"></canvas>
          <div class="overlay-msg loading-msg" id="loading-${pageNumber}">
            <div>Loading slide ${pageNumber}...</div>
          </div>
        </div>
      `;
      return slide;
    }

    function getSlideWidth() {
      const firstSlide = container.querySelector('.carousel-slide');
      if (!firstSlide) return 0;
      return firstSlide.offsetWidth + 16;
    }

    function updateSlideCounter() {
      const slideWidth = getSlideWidth();
      if (!slideWidth || !totalSlides) return;
      const currentIndex = Math.round(container.scrollLeft / slideWidth) + 1;
      slideCounter.textContent = `Slide ${Math.min(currentIndex, totalSlides)} of ${totalSlides}`;
    }

    async function renderPage(pdf, pageNumber) {
      const slide = createCanvasSlide(pageNumber);
      container.appendChild(slide);

      const canvas = document.getElementById(`pdf-canvas-${pageNumber}`);
      const loadingEl = document.getElementById(`loading-${pageNumber}`);

      try {
        const page = await pdf.getPage(pageNumber);
        const context = canvas.getContext('2d');

        const slideWidth = slide.clientWidth || window.innerWidth * 0.9;
        const unscaledViewport = page.getViewport(1);
        const scale = slideWidth / unscaledViewport.width;
        const viewport = page.getViewport(scale);

        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        context.setTransform(dpr, 0, 0, dpr, 0, 0);

        await page.render({
          canvasContext: context,
          viewport: viewport
        });

        loadingEl.remove();
      } catch (error) {
        console.error(`Failed to render page ${pageNumber}`, error);
        slide.querySelector('.pdf-wrapper').innerHTML = `
          <div class="overlay-msg error-msg">
            <div>
              <strong>Failed to render page ${pageNumber}</strong><br><br>
              <span style="font-size:12px;">${error.message || error}</span>
            </div>
          </div>
        `;
      }
    }

    async function initCarousel() {
      container.innerHTML = '';
      container.appendChild(createMessageSlide('Loading SCWK Bites PDF...'));
      slideCounter.textContent = 'Loading...';

      try {
        if (!window.PDFJS) {
          throw new Error('Local PDFJS not loaded. Check ./lib/pdfjs/pdf.min.js');
        }

        PDFJS.disableWorker = true;

        const pdf = await PDFJS.getDocument(pdfFile);

        totalSlides = pdf.numPages;
        container.innerHTML = '';

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          await renderPage(pdf, pageNum);
        }

        if (pdf.numPages === 0) {
          container.appendChild(createMessageSlide('PDF loaded but has no pages.', true));
          slideCounter.textContent = 'No slides found';
          return;
        }

        updateSlideCounter();
      } catch (error) {
        console.error('PDF load failed:', error);
        container.innerHTML = '';
        container.appendChild(
          createMessageSlide(
            `<strong>Failed to load PDF</strong><br><br>${pdfFile}<br><br><span style="font-size:12px;">${error.message || error}</span>`,
            true
          )
        );
        slideCounter.textContent = 'Error loading slides';
      }
    }

    initCarousel();

    prevBtn.addEventListener('click', () => {
      const slideWidth = getSlideWidth();
      container.scrollBy({ left: -slideWidth, behavior: 'smooth' });
      setTimeout(updateSlideCounter, 350);
    });

    nextBtn.addEventListener('click', () => {
      const slideWidth = getSlideWidth();
      container.scrollBy({ left: slideWidth, behavior: 'smooth' });
      setTimeout(updateSlideCounter, 350);
    });

    container.addEventListener('scroll', () => {
      clearTimeout(container._scrollTimer);
      container._scrollTimer = setTimeout(updateSlideCounter, 100);
    });

    let isDown = false;
    let startX;
    let scrollLeft;

    container.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - container.offsetLeft;
      scrollLeft = container.scrollLeft;
    });

    container.addEventListener('mouseleave', () => {
      isDown = false;
    });

    container.addEventListener('mouseup', () => {
      isDown = false;
    });

    container.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - container.offsetLeft;
      const walk = (x - startX) * 1.3;
      container.scrollLeft = scrollLeft - walk;
    });
  </script>

</body>
</html>
