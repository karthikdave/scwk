<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carousel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen">

<div id="viewer" class="w-full max-w-md px-4 text-center">
  <p id="status">Loading PDF...</p>
</div>

<div class="flex justify-between w-full max-w-md mt-4 px-4">
  <button onclick="prevPage()" class="bg-white text-black px-4 py-2 rounded">Prev</button>
  <button onclick="nextPage()" class="bg-white text-black px-4 py-2 rounded">Next</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

let pdfDoc = null;
let pageNum = 1;

fetch("data.json")
.then(res => res.json())
.then(data => {

  const post = data.posts.find(p => p.id == id);

  if (!post) {
    document.getElementById("status").innerText = "❌ Post not found";
    return;
  }

  // 🔥 IMPORTANT DEBUG
  console.log("Loading file:", post.file);

  pdfjsLib.getDocument(post.file).promise
  .then(pdf => {
    pdfDoc = pdf;
    renderPage(pageNum);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ PDF not loading. Check file path.";
  });

});

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 1 });

    const containerWidth = viewer.clientWidth;
    const scale = containerWidth / viewport.width;

    const scaledViewport = page.getViewport({ scale });

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    viewer.appendChild(canvas);

    page.render({
      canvasContext: ctx,
      viewport: scaledViewport
    });

  });
}

function nextPage() {
  if (!pdfDoc) return;
  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc) return;
  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}
</script>

</body>
</html>
