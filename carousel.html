<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Carousel Viewer</title>
  <meta
    name="description"
    content="SCWK dedicated PDF carousel viewer for Bites and Lites."
  />
  <style>
    :root {
      --primary: #0b3d91;
      --primary-dark: #072b67;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe7ff;
      --bg-top: #f8fbff;
      --bg-bottom: #eef5ff;
      --card-bg: #ffffff;
      --stage-bg: linear-gradient(180deg, #edf4ff 0%, #e5efff 100%);
      --shadow-main: 0 14px 34px rgba(11, 61, 145, 0.08);
      --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.12);
      --max-width: 1080px;

      /* Core: tighter LinkedIn-like stage */
      --stage-height: min(72vh, 760px);
      --stage-max-canvas-height: calc(min(72vh, 760px) - 40px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      width: min(var(--max-width), calc(100% - 28px));
      margin: 0 auto;
    }

    .viewer-page {
      min-height: 100vh;
      padding: 18px 0 24px;
      display: flex;
      align-items: flex-start;
    }

    .viewer-shell {
      width: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow-main);
      padding: 18px;
    }

    .viewer-head {
      text-align: center;
      margin-bottom: 10px;
    }

    .viewer-head .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef5ff;
      color: var(--primary);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #d9e8ff;
      margin-bottom: 10px;
    }

    .viewer-head h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.2;
      color: var(--text);
    }

    .viewer-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status {
      text-align: center;
      min-height: 20px;
      margin: 10px 0 12px;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
    }

    .status.error {
      color: #b91c1c;
    }

    /* LinkedIn-like slide stage */
    .stage-wrap {
      position: relative;
    }

    .canvas-frame {
      position: relative;
      width: 100%;
      height: var(--stage-height);
      min-height: 420px;
      max-height: 760px;
      background: var(--stage-bg);
      border: 1px solid #d9e8ff;
      border-radius: 22px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* important: removes ugly internal scroll */
      user-select: none;
      touch-action: pan-y;
    }

    .slide-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: var(--stage-max-canvas-height);
      width: auto;
      height: auto;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.22s ease, opacity 0.22s ease;
      opacity: 1;
      transform: scale(1);
    }

    .canvas-transitioning canvas {
      opacity: 0.92;
      transform: scale(0.985);
    }

    /* Click zones for desktop/mobile tap */
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 18%;
      z-index: 3;
      cursor: pointer;
      border: none;
      background: transparent;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .nav-zone.left {
      left: 0;
    }

    .nav-zone.right {
      right: 0;
    }

    .canvas-frame:hover .nav-zone {
      opacity: 1;
    }

    .nav-zone::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      display: flex;
    }

    .nav-zone.left::after {
      left: 10px;
    }

    .nav-zone.right::after {
      right: 10px;
    }

    .nav-zone.left::before,
    .nav-zone.right::before {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      font-weight: 900;
      color: var(--primary);
      z-index: 4;
    }

    .nav-zone.left::before {
      content: "‹";
      left: 26px;
    }

    .nav-zone.right::before {
      content: "›";
      right: 24px;
    }

    .controls {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      text-decoration: none;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #1d5fd1 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(11, 61, 145, 0.18);
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid #d9e8ff;
      box-shadow: 0 8px 18px rgba(11, 61, 145, 0.08);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .page-indicator {
      min-width: 110px;
      text-align: center;
      font-weight: 800;
      color: var(--text);
      padding: 0 8px;
      font-size: 14px;
    }

    /* Page dots for carousel feel */
    .dots {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 20px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: none;
      background: #c8dafd;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      padding: 0;
    }

    .dot:hover {
      transform: scale(1.15);
    }

    .dot.active {
      background: var(--primary);
      transform: scale(1.18);
    }

    .hint {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .back-link-wrap {
      text-align: center;
      margin-top: 14px;
    }

    .back-link {
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      :root {
        --stage-height: min(68vh, 680px);
        --stage-max-canvas-height: calc(min(68vh, 680px) - 36px);
      }
    }

    @media (max-width: 640px) {
      :root {
        --stage-height: min(66vh, 600px);
        --stage-max-canvas-height: calc(min(66vh, 600px) - 28px);
      }

      .container {
        width: min(var(--max-width), calc(100% - 16px));
      }

      .viewer-page {
        padding: 10px 0 16px;
      }

      .viewer-shell {
        border-radius: 18px;
        padding: 12px;
      }

      .viewer-head h1 {
        font-size: 22px;
      }

      .viewer-head p {
        font-size: 12px;
      }

      .canvas-frame {
        min-height: 360px;
        border-radius: 16px;
        padding: 10px;
      }

      .controls {
        gap: 8px;
      }

      .controls .btn {
        min-height: 40px;
        padding: 0 14px;
        font-size: 13px;
      }

      .nav-zone {
        width: 24%;
      }

      .nav-zone::after {
        width: 36px;
        height: 36px;
      }

      .nav-zone.left::before {
        left: 22px;
      }

      .nav-zone.right::before {
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="viewer-page">
    <div class="container">
      <section class="viewer-shell">
        <div class="viewer-head">
          <div class="eyebrow">SCWK Carousel Viewer</div>
          <h1 id="viewerTitle">Loading...</h1>
          <p id="viewerSubtitle">Preparing your page-by-page carousel experience.</p>
        </div>

        <div id="status" class="status">Loading PDF document...</div>

        <div class="stage-wrap">
          <div id="canvasFrame" class="canvas-frame">
            <button id="leftZone" class="nav-zone left" aria-label="Previous page"></button>
            <div id="slideStage" class="slide-stage">
              <canvas id="pdfCanvas"></canvas>
            </div>
            <button id="rightZone" class="nav-zone right" aria-label="Next page"></button>
          </div>
        </div>

        <div class="controls">
          <button id="prevBtn" class="btn btn-secondary" disabled>Previous</button>
          <div id="pageIndicator" class="page-indicator">Page 0 / 0</div>
          <button id="nextBtn" class="btn btn-primary" disabled>Next</button>
        </div>

        <div id="dots" class="dots"></div>

        <div class="hint">
          Swipe on mobile • Use arrow keys on desktop • Tap/click sides to navigate
        </div>

        <div class="back-link-wrap">
          <a href="./index.html" class="back-link">← Back to Home</a>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const config = {
        bites: {
          title: "SCWK Bites",
          subtitle: "A focused, page-by-page carousel experience for quick and practical insights.",
          path: "./pdf/bites.pdf"
        },
        lites: {
          title: "SCWK Lites",
          subtitle: "A clean, premium carousel flow with a lighter reading rhythm.",
          path: "./pdf/lites.pdf"
        }
      };

      const viewerTitle = document.getElementById("viewerTitle");
      const viewerSubtitle = document.getElementById("viewerSubtitle");
      const statusEl = document.getElementById("status");
      const canvasFrame = document.getElementById("canvasFrame");
      const slideStage = document.getElementById("slideStage");
      const canvas = document.getElementById("pdfCanvas");
      const ctx = canvas.getContext("2d");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageIndicator = document.getElementById("pageIndicator");
      const dotsWrap = document.getElementById("dots");
      const leftZone = document.getElementById("leftZone");
      const rightZone = document.getElementById("rightZone");

      let pdfDoc = null;
      let currentPage = 1;
      let isRendering = false;
      let pendingPage = null;
      let touchStartX = 0;
      let touchEndX = 0;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function updateControls() {
        const total = pdfDoc ? pdfDoc.numPages : 0;
        pageIndicator.textContent = `Page ${total ? currentPage : 0} / ${total}`;
        prevBtn.disabled = !pdfDoc || currentPage <= 1 || isRendering;
        nextBtn.disabled = !pdfDoc || currentPage >= total || isRendering;
      }

      function buildDots() {
        dotsWrap.innerHTML = "";
        if (!pdfDoc) return;

        const total = pdfDoc.numPages;

        for (let i = 1; i <= total; i++) {
          const dot = document.createElement("button");
          dot.className = "dot" + (i === currentPage ? " active" : "");
          dot.setAttribute("aria-label", `Go to page ${i}`);
          dot.addEventListener("click", () => queueRenderPage(i));
          dotsWrap.appendChild(dot);
        }
      }

      function updateDots() {
        const dots = dotsWrap.querySelectorAll(".dot");
        dots.forEach((dot, index) => {
          dot.classList.toggle("active", index + 1 === currentPage);
        });
      }

      function queueRenderPage(pageNum) {
        if (!pdfDoc) return;

        if (pageNum < 1 || pageNum > pdfDoc.numPages) return;

        if (isRendering) {
          pendingPage = pageNum;
        } else {
          renderPage(pageNum);
        }
      }

      async function renderPage(pageNum) {
        if (!pdfDoc) return;

        isRendering = true;
        updateControls();
        canvasFrame.classList.add("canvas-transitioning");
        setStatus(`Rendering page ${pageNum}...`);

        try {
          const page = await pdfDoc.getPage(pageNum);

          const frameStyle = window.getComputedStyle(canvasFrame);
          const framePaddingX =
            parseFloat(frameStyle.paddingLeft) + parseFloat(frameStyle.paddingRight);
          const framePaddingY =
            parseFloat(frameStyle.paddingTop) + parseFloat(frameStyle.paddingBottom);

          const availableWidth = Math.max(280, canvasFrame.clientWidth - framePaddingX - 10);
          const availableHeight = Math.max(300, canvasFrame.clientHeight - framePaddingY - 10);

          const baseViewport = page.getViewport({ scale: 1 });

          const widthScale = availableWidth / baseViewport.width;
          const heightScale = availableHeight / baseViewport.height;

          /* KEY FIX: contain, not fill -> avoids giant ugly tall render */
          const scale = Math.min(widthScale, heightScale);

          const viewport = page.getViewport({ scale });

          const outputScale = window.devicePixelRatio || 1;

          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = `${Math.floor(viewport.width)}px`;
          canvas.style.height = `${Math.floor(viewport.height)}px`;

          const renderContext = {
            canvasContext: ctx,
            viewport,
            transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
          };

          await page.render(renderContext).promise;

          currentPage = pageNum;
          updateDots();
          setStatus("Ready");
        } catch (error) {
          console.error("Render error:", error);
          setStatus("Unable to render this PDF page.", true);
        } finally {
          isRendering = false;
          updateControls();
          canvasFrame.classList.remove("canvas-transitioning");

          if (pendingPage !== null) {
            const nextPending = pendingPage;
            pendingPage = null;
            renderPage(nextPending);
          }
        }
      }

      async function loadPdf() {
        if (!config[id]) {
          viewerTitle.textContent = "Content Not Found";
          viewerSubtitle.textContent = "The requested SCWK carousel is unavailable.";
          setStatus("Invalid carousel link. Please return to home and try again.", true);
          return;
        }

        const selected = config[id];
        viewerTitle.textContent = selected.title;
        viewerSubtitle.textContent = selected.subtitle;

        if (!window.pdfjsLib) {
          setStatus("PDF library failed to load. Refresh once and try again.", true);
          return;
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        try {
          setStatus("Loading PDF document...");

          const loadingTask = pdfjsLib.getDocument({
            url: selected.path
          });

          pdfDoc = await loadingTask.promise;
          currentPage = 1;

          buildDots();
          updateControls();
          await renderPage(currentPage);
        } catch (error) {
          console.error("PDF load error:", error);
          setStatus("PDF failed to load. Confirm the file exists in /pdf/ with exact lowercase name.", true);
        }
      }

      function goPrev() {
        if (!pdfDoc || currentPage <= 1 || isRendering) return;
        queueRenderPage(currentPage - 1);
      }

      function goNext() {
        if (!pdfDoc || currentPage >= pdfDoc.numPages || isRendering) return;
        queueRenderPage(currentPage + 1);
      }

      prevBtn.addEventListener("click", goPrev);
      nextBtn.addEventListener("click", goNext);
      leftZone.addEventListener("click", goPrev);
      rightZone.addEventListener("click", goNext);

      /* Keyboard support */
      window.addEventListener("keydown", function (e) {
        if (!pdfDoc) return;
        if (e.key === "ArrowLeft") goPrev();
        if (e.key === "ArrowRight") goNext();
      });

      /* Swipe support */
      canvasFrame.addEventListener("touchstart", function (e) {
        if (!e.changedTouches || !e.changedTouches.length) return;
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      canvasFrame.addEventListener("touchend", function (e) {
        if (!e.changedTouches || !e.changedTouches.length) return;
        touchEndX = e.changedTouches[0].clientX;

        const deltaX = touchEndX - touchStartX;
        const threshold = 40;

        if (Math.abs(deltaX) < threshold) return;

        if (deltaX > 0) {
          goPrev();
        } else {
          goNext();
        }
      }, { passive: true });

      /* Refit current page on resize */
      let resizeTimer;
      window.addEventListener("resize", function () {
        if (!pdfDoc) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          if (!isRendering) {
            queueRenderPage(currentPage);
          }
        }, 120);
      });

      loadPdf();
    })();
  </script>
</body>
</html>
