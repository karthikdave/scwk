<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCWK Bites Carousel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.147/pdf.min.js"></script>
  <style>
    .carousel-container {
      overflow-x: hidden;
      scroll-snap-type: x mandatory;
      display: flex;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .carousel-slide {
      scroll-snap-align: start;
      flex: 0 0 auto;
      width: 90vw; /* mobile-first */
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      background: white;
      position: relative;
    }

    @media(min-width: 768px) {
      .carousel-slide {
        width: 400px; /* slim desktop */
      }
    }

    /* Buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 0.5rem 0.75rem;
      border-radius: 9999px;
      cursor: pointer;
      z-index: 10;
      user-select: none;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.8); }
    .prev-btn { left: 0.5rem; }
    .next-btn { right: 0.5rem; }
  </style>
</head>
<body class="bg-gray-50 p-4">

  <h1 class="text-2xl font-bold mb-4">SCWK Bites</h1>

  <div class="relative">
    <div class="carousel-container flex">
      <!-- Slides injected via JS -->
    </div>

    <!-- Navigation buttons -->
    <div class="nav-btn prev-btn">&#10094;</div>
    <div class="nav-btn next-btn">&#10095;</div>
  </div>

  <script>
    const pdfFiles = [
      '/pdf/bites1.pdf',
      '/pdf/bites2.pdf',
      '/pdf/bites3.pdf',
    ];

    const container = document.querySelector('.carousel-container');

    pdfFiles.forEach((file, index) => {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';
      slide.innerHTML = `<canvas id="pdf-canvas-${index}" class="w-full rounded"></canvas>`;
      container.appendChild(slide);

      // Load PDF page
      pdfjsLib.getDocument(file).promise.then(pdf => {
        pdf.getPage(1).then(page => {
          const canvas = document.getElementById(`pdf-canvas-${index}`);
          const context = canvas.getContext('2d');

          // Scale PDF to fit container width
          const scale = 1.2;
          const viewport = page.getViewport({ scale });
          canvas.height = viewport.height;
          canvas.width = viewport.width;

          page.render({ canvasContext: context, viewport });
        });
      });
    });

    // Navigation buttons
    const prevBtn = document.querySelector('.prev-btn');
    const nextBtn = document.querySelector('.next-btn');

    prevBtn.addEventListener('click', () => {
      const slideWidth = container.querySelector('.carousel-slide').offsetWidth + 16;
      container.scrollBy({ left: -slideWidth, behavior: 'smooth' });
    });

    nextBtn.addEventListener('click', () => {
      const slideWidth = container.querySelector('.carousel-slide').offsetWidth + 16;
      container.scrollBy({ left: slideWidth, behavior: 'smooth' });
    });

    // Optional: drag/swipe support
    let isDown = false;
    let startX;
    let scrollLeft;

    container.addEventListener('mousedown', e => {
      isDown = true;
      container.classList.add('cursor-grabbing');
      startX = e.pageX - container.offsetLeft;
      scrollLeft = container.scrollLeft;
    });

    container.addEventListener('mouseleave', () => {
      isDown = false;
      container.classList.remove('cursor-grabbing');
    });

    container.addEventListener('mouseup', () => {
      isDown = false;
      container.classList.remove('cursor-grabbing');
    });

    container.addEventListener('mousemove', e => {
      if(!isDown) return;
      e.preventDefault();
      const x = e.pageX - container.offsetLeft;
      const walk = (x - startX) * 2; // scroll-fast
      container.scrollLeft = scrollLeft - walk;
    });

    // Touch support for mobile swipe
    let startTouchX = 0;
    container.addEventListener('touchstart', e => {
      startTouchX = e.touches[0].clientX;
    });

    container.addEventListener('touchmove', e => {
      const touchX = e.touches[0].clientX;
      const walk = startTouchX - touchX;
      container.scrollLeft += walk;
      startTouchX = touchX;
    });
  </script>
</body>
</html>
