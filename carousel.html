<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Carousel Viewer</title>
  <meta
    name="description"
    content="SCWK dedicated PDF carousel viewer for Bites and Lites."
  />
  <style>
    :root {
      --bg: #f5f8ff;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --primary: #0b3d91;
      --primary-dark: #072b67;
      --primary-soft: #dfeeff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe7ff;
      --shadow: 0 14px 34px rgba(11, 61, 145, 0.08);
      --shadow-soft: 0 8px 18px rgba(15, 23, 42, 0.08);
      --max-width: 1080px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
      color: var(--text);
    }

    .container {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
    }

    .viewer-page {
      padding: 24px 0 34px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
    }

    .viewer-shell {
      width: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f6faff 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .viewer-head {
      text-align: center;
      margin-bottom: 14px;
    }

    .viewer-head .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #eef5ff;
      color: var(--primary);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid #d9e8ff;
      margin-bottom: 12px;
    }

    .viewer-head h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 36px);
      color: var(--text);
    }

    .viewer-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .status {
      text-align: center;
      min-height: 24px;
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
    }

    .status.error {
      color: #b91c1c;
    }

    .canvas-frame {
      width: 100%;
      background: #e9f1ff;
      border: 1px solid #d9e8ff;
      border-radius: 20px;
      padding: 12px;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
    }

    .controls {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      text-decoration: none;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #1d5fd1 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(11, 61, 145, 0.18);
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid #d9e8ff;
      box-shadow: 0 8px 18px rgba(11, 61, 145, 0.08);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .page-indicator {
      min-width: 120px;
      text-align: center;
      font-weight: 800;
      color: var(--text);
      padding: 0 8px;
      font-size: 14px;
    }

    .back-link-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .back-link {
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .container {
        width: min(var(--max-width), calc(100% - 20px));
      }

      .viewer-shell {
        border-radius: 20px;
        padding: 16px;
      }

      .canvas-frame {
        padding: 8px;
      }

      .controls {
        flex-direction: column;
      }

      .controls .btn {
        width: 100%;
      }

      .page-indicator {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="viewer-page">
    <div class="container">
      <section class="viewer-shell">
        <div class="viewer-head">
          <div class="eyebrow">SCWK Carousel Viewer</div>
          <h1 id="viewerTitle">Loading...</h1>
          <p id="viewerSubtitle">Preparing your page-by-page carousel experience.</p>
        </div>

        <div id="status" class="status">Loading PDF document...</div>

        <div class="canvas-frame">
          <canvas id="pdfCanvas"></canvas>
        </div>

        <div class="controls">
          <button id="prevBtn" class="btn btn-secondary" disabled>Previous</button>
          <div id="pageIndicator" class="page-indicator">Page 0 / 0</div>
          <button id="nextBtn" class="btn btn-primary" disabled>Next</button>
        </div>

        <div class="back-link-wrap">
          <a href="./index.html" class="back-link">← Back to Home</a>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      const config = {
        bites: {
          title: "SCWK Bites",
          subtitle: "A focused, page-by-page carousel experience for quick and practical insights.",
          path: "./pdf/bites.pdf"
        },
        lites: {
          title: "SCWK Lites",
          subtitle: "A clean, premium carousel flow with a lighter reading rhythm.",
          path: "./pdf/lites.pdf"
        }
      };

      const viewerTitle = document.getElementById("viewerTitle");
      const viewerSubtitle = document.getElementById("viewerSubtitle");
      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("pdfCanvas");
      const ctx = canvas.getContext("2d");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageIndicator = document.getElementById("pageIndicator");

      let pdfDoc = null;
      let currentPage = 1;
      let isRendering = false;
      let pendingPage = null;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function updateControls() {
        const total = pdfDoc ? pdfDoc.numPages : 0;
        pageIndicator.textContent = `Page ${total ? currentPage : 0} / ${total}`;
        prevBtn.disabled = !pdfDoc || currentPage <= 1 || isRendering;
        nextBtn.disabled = !pdfDoc || currentPage >= total || isRendering;
      }

      function queueRenderPage(pageNum) {
        if (isRendering) {
          pendingPage = pageNum;
        } else {
          renderPage(pageNum);
        }
      }

      async function renderPage(pageNum) {
        if (!pdfDoc) return;

        isRendering = true;
        updateControls();
        setStatus(`Rendering page ${pageNum}...`);

        try {
          const page = await pdfDoc.getPage(pageNum);

          const container = document.querySelector(".canvas-frame");
          const containerWidth = Math.max(320, container.clientWidth - 24);

          const initialViewport = page.getViewport({ scale: 1 });
          const scale = containerWidth / initialViewport.width;
          const viewport = page.getViewport({ scale });

          const outputScale = window.devicePixelRatio || 1;

          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);
          canvas.style.width = `${Math.floor(viewport.width)}px`;
          canvas.style.height = `${Math.floor(viewport.height)}px`;

          const renderContext = {
            canvasContext: ctx,
            viewport,
            transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
          };

          await page.render(renderContext).promise;

          currentPage = pageNum;
          setStatus("PDF loaded successfully.");
        } catch (error) {
          console.error("Render error:", error);
          setStatus("Unable to render this PDF page.", true);
        } finally {
          isRendering = false;
          updateControls();

          if (pendingPage !== null) {
            const nextPending = pendingPage;
            pendingPage = null;
            renderPage(nextPending);
          }
        }
      }

      async function loadPdf() {
        if (!config[id]) {
          viewerTitle.textContent = "Content Not Found";
          viewerSubtitle.textContent = "The requested SCWK carousel is unavailable.";
          setStatus("Invalid carousel link. Please return to home and try again.", true);
          return;
        }

        const selected = config[id];
        viewerTitle.textContent = selected.title;
        viewerSubtitle.textContent = selected.subtitle;

        if (!window.pdfjsLib) {
          setStatus("PDF library failed to load. Refresh once and try again.", true);
          return;
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        try {
          setStatus("Loading PDF document...");

          const loadingTask = pdfjsLib.getDocument({
            url: selected.path
          });

          pdfDoc = await loadingTask.promise;
          currentPage = 1;

          updateControls();
          await renderPage(currentPage);
        } catch (error) {
          console.error("PDF load error:", error);
          setStatus("PDF failed to load. Confirm the file exists in /pdf/ with exact lowercase name.", true);
        }
      }

      prevBtn.addEventListener("click", function () {
        if (!pdfDoc || currentPage <= 1 || isRendering) return;
        queueRenderPage(currentPage - 1);
      });

      nextBtn.addEventListener("click", function () {
        if (!pdfDoc || currentPage >= pdfDoc.numPages || isRendering) return;
        queueRenderPage(currentPage + 1);
      });

      window.addEventListener("resize", function () {
        if (pdfDoc && !isRendering) {
          queueRenderPage(currentPage);
        }
      });

      loadPdf();
    })();
  </script>
</body>
</html>
