<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCWK Carousel</title>
  <meta name="description" content="SCWK carousel viewer for Bites and Lites PDFs." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #f8fafc;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .slide {
      scroll-snap-align: center;
      flex: 0 0 auto;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <div class="min-h-screen flex flex-col">
    <!-- Top Bar -->
    <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between gap-3">
        <div>
          <h1 id="pageTitle" class="text-base sm:text-lg font-bold">SCWK</h1>
          <p id="pageSubtitle" class="text-xs sm:text-sm text-slate-500">Loading...</p>
        </div>

        <div class="flex items-center gap-2 sm:gap-3">
          <a id="openPdfBtn" href="#" target="_blank" class="inline-flex items-center rounded-full border border-slate-300 bg-white px-3 sm:px-4 py-2 text-xs sm:text-sm font-semibold text-slate-700 hover:border-slate-400 transition">
            Open Full PDF
          </a>
          <a href="./index.html" class="inline-flex items-center rounded-full bg-slate-900 px-3 sm:px-4 py-2 text-xs sm:text-sm font-semibold text-white hover:bg-slate-800 transition">
            Home
          </a>
        </div>
      </div>
    </header>

    <!-- Status -->
    <div id="statusBar" class="mx-auto w-full max-w-7xl px-4 pt-4">
      <div id="statusMessage" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600 shadow-sm">
        Loading SCWK PDF...
      </div>
    </div>

    <!-- Carousel Area -->
    <main class="flex-1 w-full">
      <div class="mx-auto max-w-7xl px-2 sm:px-4 py-4 sm:py-6">
        <div class="relative">
          <!-- Prev -->
          <button id="prevBtn" class="hidden md:flex absolute left-2 top-1/2 -translate-y-1/2 z-20 h-12 w-12 items-center justify-center rounded-full bg-slate-900/90 text-white shadow-lg hover:bg-slate-800 transition">
            &#10094;
          </button>

          <!-- Slides -->
          <div id="carouselTrack" class="hide-scrollbar flex gap-4 overflow-x-auto scroll-smooth snap-x snap-mandatory px-1 sm:px-2 py-2">
            <!-- Slides injected here -->
          </div>

          <!-- Next -->
          <button id="nextBtn" class="hidden md:flex absolute right-2 top-1/2 -translate-y-1/2 z-20 h-12 w-12 items-center justify-center rounded-full bg-slate-900/90 text-white shadow-lg hover:bg-slate-800 transition">
            &#10095;
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Local PDF.js -->
  <script src="./lib/pdfjs/pdf.min.js"></script>

  <script>
    // IMPORTANT: Use local worker-less mode for GitHub Pages stability
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = '';
    }

    const params = new URLSearchParams(window.location.search);
    const contentId = (params.get('id') || 'bites').toLowerCase();

    // FINAL SCWK brand mapping
    const contentMap = {
      bites: {
        title: 'SCWK Bites',
        subtitle: 'Bite-sized Agile thoughts and quick practical insights',
        pdf: './pdf/bites.pdf'
      },
      lites: {
        title: 'SCWK Lites',
        subtitle: 'Light-hearted bites with a simpler, softer learning vibe',
        pdf: './pdf/lites.pdf'
      }
    };

    const selected = contentMap[contentId] || contentMap.bites;

    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const openPdfBtn = document.getElementById('openPdfBtn');
    const statusMessage = document.getElementById('statusMessage');
    const statusBar = document.getElementById('statusBar');
    const carouselTrack = document.getElementById('carouselTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    pageTitle.textContent = selected.title;
    pageSubtitle.textContent = selected.subtitle;
    openPdfBtn.href = selected.pdf;
    document.title = `${selected.title} | SCWK`;

    function setStatus(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.className = isError
        ? 'rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 shadow-sm'
        : 'rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600 shadow-sm';
    }

    function clearStatus() {
      statusBar.style.display = 'none';
    }

    function createSlide(pageNum) {
      const slide = document.createElement('div');
      slide.className = 'slide w-[88vw] sm:w-[72vw] md:w-[420px] lg:w-[460px] xl:w-[500px] rounded-3xl border border-slate-200 bg-white shadow-lg overflow-hidden';

      slide.innerHTML = `
        <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
          <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">${selected.title}</span>
          <span class="text-xs text-slate-400">Page ${pageNum}</span>
        </div>
        <div class="bg-white p-2 sm:p-3">
          <canvas id="canvas-${pageNum}" class="rounded-2xl"></canvas>
        </div>
      `;

      return slide;
    }

    async function renderPdf() {
      if (!window.pdfjsLib) {
        setStatus('PDF viewer failed to load. Check ./lib/pdfjs/pdf.min.js', true);
        return;
      }

      try {
        setStatus(`Loading ${selected.title} PDF...`);

        const loadingTask = pdfjsLib.getDocument({
          url: selected.pdf,
          disableWorker: true
        });

        const pdf = await loadingTask.promise;

        setStatus(`Rendering ${pdf.numPages} page(s)...`);

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const slide = createSlide(pageNum);
          carouselTrack.appendChild(slide);

          const page = await pdf.getPage(pageNum);
          const canvas = document.getElementById(`canvas-${pageNum}`);
          const context = canvas.getContext('2d');

          // Better mobile + desktop fit
          const baseViewport = page.getViewport({ scale: 1 });

          let targetWidth;
          if (window.innerWidth < 640) {
            targetWidth = Math.min(window.innerWidth * 0.84, 380);
          } else if (window.innerWidth < 1024) {
            targetWidth = 420;
          } else {
            targetWidth = 460;
          }

          const scale = targetWidth / baseViewport.width;
          const viewport = page.getViewport({ scale });

          canvas.width = viewport.width;
          canvas.height = viewport.height;

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;
        }

        clearStatus();
        enableDragScroll();
      } catch (error) {
        console.error('PDF render error:', error);
        setStatus(`Could not load ${selected.pdf}. Check file name/path in /pdf folder.`, true);
      }
    }

    function getSlideWidth() {
      const firstSlide = carouselTrack.querySelector('.slide');
      if (!firstSlide) return 400;
      const style = window.getComputedStyle(carouselTrack);
      const gap = parseInt(style.columnGap || style.gap || 16, 10) || 16;
      return firstSlide.offsetWidth + gap;
    }

    prevBtn.addEventListener('click', () => {
      carouselTrack.scrollBy({ left: -getSlideWidth(), behavior: 'smooth' });
    });

    nextBtn.addEventListener('click', () => {
      carouselTrack.scrollBy({ left: getSlideWidth(), behavior: 'smooth' });
    });

    function enableDragScroll() {
      let isDown = false;
      let startX = 0;
      let scrollLeft = 0;
      let moved = false;

      carouselTrack.addEventListener('mousedown', (e) => {
        isDown = true;
        moved = false;
        startX = e.pageX;
        scrollLeft = carouselTrack.scrollLeft;
        carouselTrack.classList.add('cursor-grabbing');
      });

      window.addEventListener('mouseup', () => {
        isDown = false;
        carouselTrack.classList.remove('cursor-grabbing');
      });

      carouselTrack.addEventListener('mouseleave', () => {
        isDown = false;
        carouselTrack.classList.remove('cursor-grabbing');
      });

      carouselTrack.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const walk = (e.pageX - startX) * 1.2;
        if (Math.abs(walk) > 3) moved = true;
        carouselTrack.scrollLeft = scrollLeft - walk;
      });

      // Optional: prevent accidental click after drag
      carouselTrack.addEventListener('click', (e) => {
        if (moved) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
    }

    renderPdf();
  </script>
</body>
</html>
