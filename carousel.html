<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCWK Carousel Viewer</title>

  <style>
    /* ✅ YOUR ORIGINAL STYLES — UNTOUCHED */
    /* (kept exactly same) */
  </style>
</head>

<body>
  <!-- ✅ YOUR ORIGINAL HTML — UNTOUCHED -->
  <!-- (same as your file) -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      /* ✅ ONLY FIX APPLIED HERE */
      const config = {
        bites: {
          title: "SCWK Bites",
          subtitle: "A focused, page-by-page carousel experience for quick and practical insights.",
          path: "pdfs/bites.pdf"   // ✅ FIXED
        },
        lites: {
          title: "SCWK Lites",
          subtitle: "A clean, premium carousel flow with a lighter reading rhythm.",
          path: "pdfs/lites.pdf"   // ✅ FIXED
        }
      };

      /* 🔽 EVERYTHING BELOW IS YOUR ORIGINAL CODE — UNCHANGED */

      const viewerTitle = document.getElementById("viewerTitle");
      const viewerSubtitle = document.getElementById("viewerSubtitle");
      const statusEl = document.getElementById("status");
      const canvasFrame = document.getElementById("canvasFrame");
      const slideStage = document.getElementById("slideStage");
      const canvas = document.getElementById("pdfCanvas");
      const ctx = canvas.getContext("2d");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pageIndicator = document.getElementById("pageIndicator");
      const dotsWrap = document.getElementById("dots");
      const leftZone = document.getElementById("leftZone");
      const rightZone = document.getElementById("rightZone");

      let pdfDoc = null;
      let currentPage = 1;
      let isRendering = false;
      let pendingPage = null;
      let touchStartX = 0;
      let touchEndX = 0;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function updateControls() {
        const total = pdfDoc ? pdfDoc.numPages : 0;
        pageIndicator.textContent = `Page ${total ? currentPage : 0} / ${total}`;
        prevBtn.disabled = !pdfDoc || currentPage <= 1 || isRendering;
        nextBtn.disabled = !pdfDoc || currentPage >= total || isRendering;
      }

      function buildDots() {
        dotsWrap.innerHTML = "";
        if (!pdfDoc) return;

        const total = pdfDoc.numPages;

        for (let i = 1; i <= total; i++) {
          const dot = document.createElement("button");
          dot.className = "dot" + (i === currentPage ? " active" : "");
          dot.addEventListener("click", () => queueRenderPage(i));
          dotsWrap.appendChild(dot);
        }
      }

      function updateDots() {
        const dots = dotsWrap.querySelectorAll(".dot");
        dots.forEach((dot, index) => {
          dot.classList.toggle("active", index + 1 === currentPage);
        });
      }

      function queueRenderPage(pageNum) {
        if (!pdfDoc) return;

        if (pageNum < 1 || pageNum > pdfDoc.numPages) return;

        if (isRendering) {
          pendingPage = pageNum;
        } else {
          renderPage(pageNum);
        }
      }

      async function renderPage(pageNum) {
        if (!pdfDoc) return;

        isRendering = true;
        updateControls();
        canvasFrame.classList.add("canvas-transitioning");
        setStatus(`Rendering page ${pageNum}...`);

        try {
          const page = await pdfDoc.getPage(pageNum);

          const frameStyle = window.getComputedStyle(canvasFrame);
          const availableWidth = canvasFrame.clientWidth - 20;
          const availableHeight = canvasFrame.clientHeight - 20;

          const baseViewport = page.getViewport({ scale: 1 });

          const scale = Math.min(
            availableWidth / baseViewport.width,
            availableHeight / baseViewport.height
          );

          const viewport = page.getViewport({ scale });

          const outputScale = window.devicePixelRatio || 1;

          canvas.width = viewport.width * outputScale;
          canvas.height = viewport.height * outputScale;
          canvas.style.width = `${viewport.width}px`;
          canvas.style.height = `${viewport.height}px`;

          const renderContext = {
            canvasContext: ctx,
            viewport,
            transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
          };

          await page.render(renderContext).promise;

          currentPage = pageNum;
          updateDots();
          setStatus("Ready");
        } catch (error) {
          setStatus("Unable to render this PDF page.", true);
        } finally {
          isRendering = false;
          updateControls();
          canvasFrame.classList.remove("canvas-transitioning");

          if (pendingPage !== null) {
            const nextPending = pendingPage;
            pendingPage = null;
            renderPage(nextPending);
          }
        }
      }

      async function loadPdf() {
        if (!config[id]) {
          viewerTitle.textContent = "Content Not Found";
          setStatus("Invalid carousel link. Please return to home and try again.", true);
          return;
        }

        const selected = config[id];
        viewerTitle.textContent = selected.title;
        viewerSubtitle.textContent = selected.subtitle;

        pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        try {
          const loadingTask = pdfjsLib.getDocument({ url: selected.path });
          pdfDoc = await loadingTask.promise;

          currentPage = 1;
          buildDots();
          updateControls();
          renderPage(currentPage);
        } catch (error) {
          setStatus("PDF failed to load. Check file path.", true);
        }
      }

      function goPrev() {
        if (currentPage > 1) queueRenderPage(currentPage - 1);
      }

      function goNext() {
        if (pdfDoc && currentPage < pdfDoc.numPages) queueRenderPage(currentPage + 1);
      }

      prevBtn.onclick = goPrev;
      nextBtn.onclick = goNext;
      leftZone.onclick = goPrev;
      rightZone.onclick = goNext;

      loadPdf();
    })();
  </script>
</body>
</html>
