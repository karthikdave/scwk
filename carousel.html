<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carousel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen">

<!-- VIEWER -->
<div id="viewer" class="w-full max-w-md px-4 flex justify-center items-center transition-opacity duration-300">
  <p id="status">Loading PDF...</p>
</div>

<!-- PAGE INDICATOR -->
<div id="pageInfo" class="mt-2 text-sm opacity-80"></div>

<!-- NAV -->
<div class="flex justify-between w-full max-w-md mt-4 px-4">
  <button onclick="prevPage()" class="bg-white text-black px-4 py-2 rounded">Prev</button>
  <button onclick="nextPage()" class="bg-white text-black px-4 py-2 rounded">Next</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// 🔥 GET ID (MOBILE SAFE)
let urlParams = new URLSearchParams(window.location.search);
let id = urlParams.get("id");

if (!id) {
  const match = window.location.href.match(/id=(\d+)/);
  if (match) id = match[1];
}

let pdfDoc = null;
let pageNum = 1;

fetch("data.json")
.then(res => res.json())
.then(data => {

  const post = data.posts.find(p => p.id == id);

  if (!post) {
    document.getElementById("status").innerText = "❌ Post not found";
    return;
  }

  pdfjsLib.getDocument(post.file).promise
  .then(pdf => {
    pdfDoc = pdf;
    renderPage(pageNum);
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ PDF not loading";
  });

});

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const viewer = document.getElementById("viewer");

    viewer.style.opacity = 0;

    setTimeout(() => {

      viewer.innerHTML = "";

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const viewport = page.getViewport({ scale: 1 });
      const scale = viewer.clientWidth / viewport.width;
      const scaledViewport = page.getViewport({ scale });

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;

      viewer.appendChild(canvas);

      page.render({
        canvasContext: ctx,
        viewport: scaledViewport
      });

      viewer.style.opacity = 1;

      document.getElementById("pageInfo").innerText =
        `Page ${pageNum} / ${pdfDoc.numPages}`;

    }, 150);

  });
}

function nextPage() {
  if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (!pdfDoc || pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

// 🔥 SWIPE SUPPORT
let startX = 0;
let endX = 0;

const viewer = document.getElementById("viewer");

viewer.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

viewer.addEventListener("mousedown", e => {
  startX = e.clientX;
});

viewer.addEventListener("mouseup", e => {
  endX = e.clientX;
  handleSwipe();
});

function handleSwipe() {
  const diff = startX - endX;

  if (Math.abs(diff) < 50) return;

  if (diff > 0) nextPage();
  else prevPage();
}
</script>

</body>
</html>
