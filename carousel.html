<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carousel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="bg-black flex flex-col items-center justify-center min-h-screen">

<div id="viewer" class="w-full max-w-3xl"></div>

<div class="flex justify-between w-full max-w-3xl mt-4 px-4">
  <button onclick="prevPage()" class="bg-white px-4 py-2 rounded">Prev</button>
  <button onclick="nextPage()" class="bg-white px-4 py-2 rounded">Next</button>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

let pdfDoc = null;
let pageNum = 1;

fetch("data.json")
.then(res => res.json())
.then(data => {

  const post = data.posts.find(p => p.id == id);

  if (!post) {
    document.body.innerHTML = "<h1 class='text-white'>Post not found</h1>";
    return;
  }

  pdfjsLib.getDocument(post.file).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(pageNum);
  });

});

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {

    const viewport = page.getViewport({ scale: 1.5 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    document.getElementById("viewer").innerHTML = "";
    document.getElementById("viewer").appendChild(canvas);

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

  });
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}

function prevPage() {
  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}
</script>

</body>
</html>
