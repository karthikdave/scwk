<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SCWK Carousel</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    .carousel-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .carousel-container {
      width: 420px; /* 🔥 LinkedIn-like slim width */
      overflow: hidden;
      position: relative;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.4s ease;
    }

    .carousel-slide {
      min-width: 100%;
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 22px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 10;
    }

    .dot.active {
      background-color: #2563eb;
      transform: scale(1.2);
    }
  </style>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">

<!-- NAV -->
<nav class="bg-white shadow-sm px-6 py-3 flex justify-between items-center sticky top-0">
  <img src="logo.png" class="h-10">
  <a href="index.html" class="text-blue-600 font-semibold">Home</a>
</nav>

<!-- HEADER -->
<section class="text-center mt-10">
  <h1 class="text-3xl font-bold">🚀 SCWK Carousel</h1>
  <p class="text-gray-600">LinkedIn-style PDF carousel</p>
</section>

<!-- CAROUSEL -->
<section class="mt-10">
  <div class="carousel-wrapper">
    <div class="carousel-container">

      <div id="track" class="carousel-track"></div>

      <button id="prev" class="carousel-btn left-2">‹</button>
      <button id="next" class="carousel-btn right-2">›</button>

    </div>
  </div>

  <div id="dots" class="flex justify-center mt-4 gap-2"></div>
</section>

<script>
const url = "ai-shot-1.pdf";

const track = document.getElementById("track");
const dotsContainer = document.getElementById("dots");

let currentIndex = 0;
let totalPages = 0;

/* LOAD PDF */
pdfjsLib.getDocument(url).promise.then(pdf => {
  totalPages = pdf.numPages;

  for (let i = 1; i <= totalPages; i++) {
    pdf.getPage(i).then(page => {

      const viewport = page.getViewport({ scale: 1 });
      const containerWidth = 420;

      const scale = containerWidth / viewport.width;
      const scaledViewport = page.getViewport({ scale });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = scaledViewport.width;
      canvas.height = scaledViewport.height;

      page.render({
        canvasContext: context,
        viewport: scaledViewport
      });

      const slide = document.createElement("div");
      slide.className = "carousel-slide";
      slide.appendChild(canvas);

      track.appendChild(slide);

      /* DOT */
      const dot = document.createElement("span");
      dot.className = "dot w-3 h-3 bg-gray-400 rounded-full cursor-pointer transition";
      dot.onclick = () => goToSlide(i - 1);
      dotsContainer.appendChild(dot);

      updateSlide(currentIndex);
    });
  }
});

/* SLIDE CONTROL (🔥 % based, no jitter) */
function updateSlide(index) {
  track.style.transform = `translateX(-${index * 100}%)`;

  const dots = document.querySelectorAll(".dot");
  dots.forEach((d,i)=>d.classList.toggle("active", i===index));
}

function goToSlide(index) {
  currentIndex = index;
  updateSlide(currentIndex);
}

/* BUTTONS */
const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");

nextBtn.onclick = () => {
  currentIndex = (currentIndex + 1) % totalPages;
  updateSlide(currentIndex);
};

prevBtn.onclick = () => {
  currentIndex = (currentIndex - 1 + totalPages) % totalPages;
  updateSlide(currentIndex);
};

/* SWIPE (clean + stable) */
let startX = 0;

track.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX < startX - 50) nextBtn.click();
  else if (endX > startX + 50) prevBtn.click();
});
</script>

</body>
</html>
