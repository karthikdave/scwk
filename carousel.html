<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCWK Carousel</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:system-ui;
overflow-x:hidden;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,.08);
}

.top a{
color:#facc15;
text-decoration:none;
font-weight:700;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

h1{
margin:10px 0;
}

.desc{
color:#9ca3af;
margin-bottom:30px;
}

.viewer{
position:relative;
max-width:620px;
margin:auto;
}

.viewport{
overflow:hidden;
cursor:grab;
}

.track{
display:flex;
transition:transform .35s ease;
}

.slide{
min-width:100%;
display:flex;
justify-content:center;
}

.card{
background:white;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,.4);
overflow:hidden;
max-width:520px;
}

canvas{
width:100%;
height:auto;
display:block;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
width:44px;
height:44px;
border-radius:50%;
border:none;
background:#111827;
color:white;
font-size:22px;
cursor:pointer;
}

.nav:hover{
background:#1f2937;
}

.prev{left:-60px}
.next{right:-60px}

.counter{
margin-top:14px;
color:#9ca3af;
font-size:14px;
}

@media(max-width:700px){

.prev{left:0}
.next{right:0}

}

</style>
</head>

<body>

<div class="top">
<a href="./index.html">← Back</a>
<a id="pdfLink" target="_blank">Open PDF</a>
</div>

<div class="container">

<h1 id="title">SCWK</h1>
<p class="desc" id="desc"></p>

<div class="viewer">

<button class="nav prev" id="prev">‹</button>

<div class="viewport" id="viewport">
<div class="track" id="track"></div>
</div>

<button class="nav next" id="next">›</button>

</div>

<div class="counter" id="counter"></div>

</div>

<script src="./lib/pdfjs/pdf.min.js"></script>

<script>

const CONFIG = {

bites:{
title:"SCWK Bites",
desc:"Bite-sized agile thoughts. Quick insights for busy professionals.",
pdf:"./pdf/bites.pdf"
},

lites:{
title:"SCWK Lites",
desc:"Light-hearted agile reflections with a smile.",
pdf:"./pdf/lites.pdf"
}

}

const params=new URLSearchParams(location.search)
const id=params.get("id")||"bites"
const data=CONFIG[id]||CONFIG.bites

document.getElementById("title").innerText=data.title
document.getElementById("desc").innerText=data.desc
document.getElementById("pdfLink").href=data.pdf

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://unpkg.com/pdfjs-dist@3.10.111/build/pdf.worker.min.js"

const track=document.getElementById("track")
const counter=document.getElementById("counter")

let index=0
let pages=0

function update(){
track.style.transform=`translateX(-${index*100}%)`
counter.innerText=`Page ${index+1} / ${pages}`
}

document.getElementById("prev").onclick=()=>{
if(index>0){index--;update()}
}

document.getElementById("next").onclick=()=>{
if(index<pages-1){index++;update()}
}

async function loadPDF(){

const pdf=await pdfjsLib.getDocument(data.pdf).promise
pages=pdf.numPages

for(let i=1;i<=pages;i++){

const page=await pdf.getPage(i)

const viewport=page.getViewport({scale:1})
const scale=520/viewport.width
const v=page.getViewport({scale})

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=v.width
canvas.height=v.height

await page.render({
canvasContext:ctx,
viewport:v
}).promise

const slide=document.createElement("div")
slide.className="slide"

const card=document.createElement("div")
card.className="card"

card.appendChild(canvas)
slide.appendChild(card)
track.appendChild(slide)

}

update()

}

loadPDF()

</script>

</body>
</html>
